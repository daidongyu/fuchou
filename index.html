      // ==================== 输入处理 ====================
      class InputHandler {
        constructor() {
          this.keys = {}
          this.keysPressed = {}

          window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true
            if (!this.keysPressed[e.code]) this.keysPressed[e.code] = true
          })

          window.addEventListener('keyup', (e) => {
            this.keys[e.code] = false
            this.keysPressed[e.code] = false
          })

          window.addEventListener('keydown', (e) => {
            if (
              [
                'ArrowUp',
                'ArrowDown',
                'ArrowLeft',
                'ArrowRight',
                'Space',
              ].includes(e.code)
            ) {
              e.preventDefault()
            }
          })
        }

        isDown(code) {
          return !!this.keys[code]
        }

        isPressed(code) {
          if (this.keysPressed[code]) {
            this.keysPressed[code] = false
            return true
          }
          return false
        }
      }

      // ==================== 粒子系统 ====================
      class ParticleSystem {
        constructor() {
          this.particles = []
        }

        emit(x, y, color, count, speed, life) {
          for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5
            const vel = speed * (0.5 + Math.random() * 0.5)
            this.particles.push({
              x,
              y,
              vx: Math.cos(angle) * vel,
              vy: Math.sin(angle) * vel,
              life,
              maxLife: life,
              color,
              size: 3 + Math.random() * 5,
            })
          }
        }

        emitRect(x, y, color, count, speedX, speedY, life) {
          for (let i = 0; i < count; i++) {
            this.particles.push({
              x,
              y,
              vx: (Math.random() - 0.5) * speedX,
              vy: (Math.random() - 0.5) * speedY,
              life,
              maxLife: life,
              color,
              size: 4 + Math.random() * 6,
            })
          }
        }

        update() {
          for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i]
            p.x += p.vx
            p.y += p.vy
            p.vy += 0.4
            p.life--
            if (p.life <= 0) this.particles.splice(i, 1)
          }
        }

        draw(ctx) {
          for (const p of this.particles) {
            const alpha = p.life / p.maxLife
            ctx.globalAlpha = alpha
            ctx.fillStyle = p.color
            ctx.shadowBlur = 10
            ctx.shadowColor = p.color
            ctx.beginPath()
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2)
            ctx.fill()
          }
          ctx.shadowBlur = 0
          ctx.globalAlpha = 1
        }
      }

      // ==================== 投射物/广播系统 ====================
      class ProjectileSystem {
        constructor() {
          this.projectiles = []
        }

        add(type, x, y, facing, charId) {
          const configs = {
            cui: { color: '#ff69b4', speed: 12, size: 40, type: 'petal' },
            fu: { color: '#4169e1', speed: 10, size: 60, type: 'fist' },
            jia: { color: '#9370db', speed: 15, size: 35, type: 'lightning' },
            shu: { color: '#228b22', speed: 11, size: 45, type: 'leaf' },
            shen: { color: '#ff4500', speed: 13, size: 50, type: 'fireball' },
          }

          const config = configs[charId] || configs.cui

          this.projectiles.push({
            type: config.type,
            x,
            y,
            vx: facing * config.speed,
            facing,
            color: config.color,
            size: config.size,
            life: 60,
            charId,
            trail: [],
          })
        }

        update() {
          for (let i = this.projectiles.length - 1; i >= 0; i--) {
            const p = this.projectiles[i]

            p.trail.push({ x: p.x, y: p.y })
            if (p.trail.length > 8) p.trail.shift()

            p.x += p.vx
            p.life--

            if (p.life <= 0 || p.x < -100 || p.x > 1380) {
              this.projectiles.splice(i, 1)
            }
          }
        }

        draw(ctx) {
          for (const p of this.projectiles) {
            ctx.save()

            // 绘制轨迹
            if (p.trail.length > 1) {
              ctx.strokeStyle = p.color
              ctx.lineWidth = p.size * 0.3
              ctx.globalAlpha = 0.4
              ctx.beginPath()
              ctx.moveTo(p.trail[0].x, p.trail[0].y)
              for (let i = 1; i < p.trail.length; i++) {
                ctx.lineTo(p.trail[i].x, p.trail[i].y)
              }
              ctx.lineTo(p.x, p.y)
              ctx.stroke()
            }

            ctx.globalAlpha = 1
            ctx.translate(p.x, p.y)

            if (p.type === 'petal') {
              // 樱花瓣
              ctx.fillStyle = p.color
              ctx.shadowBlur = 20
              ctx.shadowColor = p.color
              for (let i = 0; i < 3; i++) {
                ctx.rotate(Math.PI / 3)
                ctx.beginPath()
                ctx.ellipse(
                  p.size / 2,
                  0,
                  p.size / 2,
                  p.size / 4,
                  0,
                  0,
                  Math.PI * 2,
                )
                ctx.fill()
              }
            } else if (p.type === 'fist') {
              // 能量拳
              ctx.scale(p.facing, 1)
              const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size)
              grad.addColorStop(0, '#fff')
              grad.addColorStop(0.3, p.color)
              grad.addColorStop(1, 'transparent')
              ctx.fillStyle = grad
              ctx.shadowBlur = 30
              ctx.shadowColor = p.color
              ctx.beginPath()
              ctx.arc(0, 0, p.size, 0, Math.PI * 2)
              ctx.fill()
              // 拳头轮廓
              ctx.strokeStyle = '#fff'
              ctx.lineWidth = 3
              ctx.beginPath()
              ctx.arc(0, 0, p.size * 0.7, 0, Math.PI * 2)
              ctx.stroke()
            } else if (p.type === 'lightning') {
              // 雷电
              ctx.strokeStyle = p.color
              ctx.lineWidth = 4
              ctx.shadowBlur = 25
              ctx.shadowColor = p.color
              ctx.beginPath()
              ctx.moveTo(-p.size, -p.size / 2)
              ctx.lineTo(-p.size / 3, 0)
              ctx.lineTo(-p.size / 2, p.size / 2)
              ctx.lineTo(p.size / 3, -p.size / 3)
              ctx.lineTo(p.size, p.size / 2)
              ctx.stroke()
              // 内核
              ctx.strokeStyle = '#fff'
              ctx.lineWidth = 2
              ctx.stroke()
            } else if (p.type === 'leaf') {
              // 飞叶
              ctx.fillStyle = p.color
              ctx.shadowBlur = 15
              ctx.shadowColor = p.color
              ctx.rotate(p.life * 0.2)
              ctx.beginPath()
              ctx.ellipse(0, 0, p.size, p.size / 3, 0, 0, Math.PI * 2)
              ctx.fill()
              // 叶脉
              ctx.strokeStyle = '#90ee90'
              ctx.lineWidth = 2
              ctx.beginPath()
              ctx.moveTo(-p.size + 5, 0)
              ctx.lineTo(p.size - 5, 0)
              ctx.stroke()
            } else if (p.type === 'fireball') {
              // 火球
              const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size)
              grad.addColorStop(0, '#ffff00')
              grad.addColorStop(0.4, '#ff8800')
              grad.addColorStop(0.8, p.color)
              grad.addColorStop(1, 'transparent')
              ctx.fillStyle = grad
              ctx.shadowBlur = 40
              ctx.shadowColor = '#ff4500'
              ctx.beginPath()
              ctx.arc(0, 0, p.size, 0, Math.PI * 2)
              ctx.fill()
              // 火焰核心
              ctx.fillStyle = '#ffff00'
              ctx.beginPath()
              ctx.arc(0, 0, p.size * 0.4, 0, Math.PI * 2)
              ctx.fill()
            }

            ctx.restore()
          }
          ctx.shadowBlur = 0
        }

        checkHit(projectile, fighter) {
          const dist = Math.hypot(
            projectile.x - fighter.x,
            projectile.y - (fighter.y + fighter.height / 2),
          )
          return dist < projectile.size + fighter.width / 2
        }
      }

      // ==================== 特效系统 ====================
      class EffectSystem {
        constructor() {
          this.effects = []
        }

        addHitSpark(x, y, color) {
          for (let i = 0; i < 12; i++) {
            this.effects.push({
              type: 'spark',
              x,
              y,
              vx: (Math.random() - 0.5) * 20,
              vy: (Math.random() - 0.5) * 20,
              color,
              life: 15,
              maxLife: 15,
            })
          }
        }

        addComboEffect(x, y, color, comboLevel) {
          // 连击光环
          this.effects.push({
            type: 'comboRing',
            x, y, color, comboLevel,
            life: 20,
            maxLife: 20,
            radius: 30 + comboLevel * 10
          })
          
          // 连击文字
          if (comboLevel >= 3) {
            this.effects.push({
              type: 'comboText',
              x, y: y - 50,
              text: comboLevel + '连击!',
              color,
              life: 30,
              maxLife: 30
            })
          }
        }

        addSpecialEffect(x, y, color, attackType, down, up, air) {
          // 组合技特效
          if (down) {
            // 下+攻击 - 地面冲击
            this.effects.push({
              type: 'groundSlam',
              x, y: y + 40,
              color,
              life: 25,
              maxLife: 25
            })
          } else if (up) {
            // 上+攻击 - 上升气流
            for (let i = 0; i < 5; i++) {
              this.effects.push({
                type: 'upWind',
                x: x + (Math.random() - 0.5) * 40,
                y: y + (Math.random() - 0.5) * 20,
                color,
                life: 20,
                maxLife: 20
              })
            }
          } else if (air) {
            // 空中攻击 - 旋转残影
            this.effects.push({
              type: 'airSpin',
              x, y,
              color,
              life: 30,
              maxLife: 30
            })
          }
        }

        addUltimate(charId, x, y, facing, isPlayer) {
          const effects = {
            cui: () => {
              // 樱花风暴 - 全屏樱花
              for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                  const px = facing > 0 ? x + 50 + i * 30 : x - 50 - i * 30
                  this.effects.push({
                    type: 'ultPetal',
                    x: px,
                    y: y - 100 + Math.random() * 200,
                    vx: facing * (5 + Math.random() * 5),
                    vy: (Math.random() - 0.5) * 3,
                    color: '#ff69b4',
                    life: 60,
                    maxLife: 60,
                  })
                }, i * 30)
              }
            },
            fu: () => {
              // 霸王裂地拳 - 巨大拳头砸地
              this.effects.push({
                type: 'giantFist',
                x: x + facing * 150,
                y: y,
                facing,
                color: '#4169e1',
                life: 80,
                maxLife: 80,
                scale: 0,
              })
              // 地震波
              for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                  this.effects.push({
                    type: 'shockwave',
                    x: x + facing * 150,
                    y: y + 90,
                    color: '#4169e1',
                    life: 40,
                    maxLife: 40,
                    radius: 50 + i * 50,
                  })
                }, i * 100)
              }
            },
            jia: () => {
              // 紫电灭世劫 - 闪电链
              for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                  const startX = facing > 0 ? x + 50 : x - 50
                  const endX = facing > 0 ? x + 400 : x - 400
                  this.effects.push({
                    type: 'lightningBolt',
                    x: startX,
                    y: y,
                    targetX: endX,
                    targetY: y - 50 + Math.random() * 100,
                    color: '#9370db',
                    life: 20,
                    maxLife: 20,
                  })
                }, i * 80)
              }
            },
            shu: () => {
              // 万木朝宗阵 - 藤蔓爆发
              for (let i = 0; i < 16; i++) {
                const angle = (Math.PI * 2 * i) / 16
                this.effects.push({
                  type: 'vine',
                  x,
                  y: y + 45,
                  angle,
                  color: '#228b22',
                  life: 90,
                  maxLife: 90,
                })
              }
            },
            shen: () => {
              // 焚天烈焰舞 - 火柱
              for (let i = 0; i < 7; i++) {
                setTimeout(() => {
                  const px = x + facing * (100 + i * 80)
                  this.effects.push({
                    type: 'firePillar',
                    x: px,
                    y: y + 90,
                    color: '#ff4500',
                    life: 80,
                    maxLife: 80,
                  })
                }, i * 60)
              }
            },
          }
          if (effects[charId]) effects[charId]()
        }

        update() {
          for (let i = this.effects.length - 1; i >= 0; i--) {
            const e = this.effects[i]
            e.life--

            if (e.vx) e.x += e.vx
            if (e.vy) e.y += e.vy
            if (e.type === 'giantFist' && e.scale < 3) e.scale += 0.1

            if (e.life <= 0) this.effects.splice(i, 1)
          }
        }

        draw(ctx) {
          for (const e of this.effects) {
            const alpha = e.life / e.maxLife
            ctx.save()

            if (e.type === 'spark') {
              ctx.strokeStyle = e.color
              ctx.lineWidth = 3
              ctx.globalAlpha = alpha
              ctx.beginPath()
              ctx.moveTo(e.x, e.y)
              ctx.lineTo(e.x - e.vx * 2, e.y - e.vy * 2)
              ctx.stroke()
            } else if (e.type === 'ultPetal') {
              ctx.fillStyle = e.color
              ctx.globalAlpha = alpha * 0.8
              ctx.translate(e.x, e.y)
              ctx.rotate(e.life * 0.1)
              ctx.beginPath()
              ctx.ellipse(0, 0, 15, 8, 0, 0, Math.PI * 2)
              ctx.fill()
            } else if (e.type === 'giantFist') {
              ctx.translate(e.x, e.y)
              ctx.scale(e.facing * e.scale, e.scale)
              const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 80)
              grad.addColorStop(0, '#fff')
              grad.addColorStop(0.3, e.color)
              grad.addColorStop(1, 'rgba(65,105,225,0.3)')
              ctx.fillStyle = grad
              ctx.shadowBlur = 50
              ctx.shadowColor = e.color
              ctx.beginPath()
              ctx.arc(0, 0, 80, 0, Math.PI * 2)
              ctx.fill()
              // 冲击线
              ctx.strokeStyle = '#fff'
              ctx.lineWidth = 5
              ctx.beginPath()
              ctx.arc(0, 0, 100, 0, Math.PI * 2)
              ctx.stroke()
            } else if (e.type === 'shockwave') {
              ctx.strokeStyle = e.color
              ctx.lineWidth = 5
              ctx.globalAlpha = alpha
              ctx.beginPath()
              ctx.ellipse(e.x, e.y, e.radius, e.radius * 0.3, 0, 0, Math.PI * 2)
              ctx.stroke()
            } else if (e.type === 'lightningBolt') {
              ctx.strokeStyle = e.color
              ctx.lineWidth = 4
              ctx.shadowBlur = 30
              ctx.shadowColor = e.color
              ctx.globalAlpha = alpha
              ctx.beginPath()
              ctx.moveTo(e.x, e.y)
              let cx = e.x
              let cy = e.y
              const steps = 5
              for (let i = 1; i <= steps; i++) {
                const t = i / steps
                cx = e.x + (e.targetX - e.x) * t + (Math.random() - 0.5) * 60
                cy = e.y + (e.targetY - e.y) * t + (Math.random() - 0.5) * 60
                ctx.lineTo(cx, cy)
              }
              ctx.stroke()
              // 内核
              ctx.strokeStyle = '#fff'
              ctx.lineWidth = 2
              ctx.stroke()
            } else if (e.type === 'vine') {
              const progress = 1 - alpha
              const length = progress * 300
              ctx.strokeStyle = e.color
              ctx.lineWidth = 8
              ctx.lineCap = 'round'
              ctx.shadowBlur = 20
              ctx.shadowColor = e.color
              ctx.globalAlpha = 0.8 + alpha * 0.2
              ctx.beginPath()
              ctx.moveTo(e.x, e.y)
              ctx.quadraticCurveTo(
                e.x +
                  Math.cos(e.angle) * length * 0.5 +
                  Math.sin(progress * 10) * 20,
                e.y + Math.sin(e.angle) * length * 0.5,
                e.x + Math.cos(e.angle) * length,
                e.y + Math.sin(e.angle) * length,
              )
              ctx.stroke()
            } else if (e.type === 'firePillar') {
              const height = (1 - alpha) * 400
              const grad = ctx.createLinearGradient(e.x, e.y, e.x, e.y - height)
              grad.addColorStop(0, 'rgba(255,69,0,0.8)')
              grad.addColorStop(0.5, 'rgba(255,140,0,0.5)')
              grad.addColorStop(1, 'transparent')
              ctx.fillStyle = grad
              ctx.shadowBlur = 40
              ctx.shadowColor = '#ff4500'
              ctx.beginPath()
              ctx.moveTo(e.x - 30, e.y)
              ctx.lineTo(e.x - 20, e.y - height)
              ctx.lineTo(e.x + 20, e.y - height)
              ctx.lineTo(e.x + 30, e.y)
              ctx.fill()
            } else if (e.type === 'comboRing') {
              // 连击光环
              ctx.strokeStyle = e.color
              ctx.lineWidth = 4
              ctx.globalAlpha = alpha
              ctx.shadowBlur = 20
              ctx.shadowColor = e.color
              ctx.beginPath()
              ctx.arc(e.x, e.y, e.radius * (2 - alpha), 0, Math.PI * 2)
              ctx.stroke()
              // 内圈
              ctx.beginPath()
              ctx.arc(e.x, e.y, e.radius * 0.6 * (2 - alpha), 0, Math.PI * 2)
              ctx.stroke()
            } else if (e.type === 'comboText') {
              // 连击文字
              ctx.fillStyle = e.color
              ctx.font = 'bold 24px Arial'
              ctx.textAlign = 'center'
              ctx.globalAlpha = alpha
              ctx.shadowBlur = 15
              ctx.shadowColor = e.color
              ctx.fillText(e.text, e.x, e.y)
            } else if (e.type === 'groundSlam') {
              // 地面冲击
              ctx.fillStyle = e.color
              ctx.globalAlpha = alpha * 0.5
              ctx.shadowBlur = 20
              ctx.shadowColor = e.color
              // 冲击波纹
              for (let i = 0; i < 3; i++) {
                ctx.beginPath()
                ctx.ellipse(e.x, e.y, (30 + i * 20) * (2 - alpha), (10 + i * 7) * (2 - alpha), 0, 0, Math.PI * 2)
                ctx.fill()
              }
              // 碎石效果
              ctx.fillStyle = '#888'
              for (let i = 0; i < 5; i++) {
                const rx = e.x + Math.cos(i * 1.2) * (20 + (1-alpha) * 50)
                const ry = e.y + Math.sin(i * 0.5) * 5
                ctx.fillRect(rx, ry, 6, 6)
              }
            } else if (e.type === 'upWind') {
              // 上升气流
              ctx.strokeStyle = e.color
              ctx.lineWidth = 3
              ctx.globalAlpha = alpha
              ctx.shadowBlur = 10
              ctx.shadowColor = e.color
              ctx.beginPath()
              ctx.moveTo(e.x, e.y + 20)
              ctx.lineTo(e.x + Math.sin(e.life * 0.3) * 10, e.y - 40)
              ctx.stroke()
            } else if (e.type === 'airSpin') {
              // 空中旋转残影
              ctx.strokeStyle = e.color
              ctx.lineWidth = 4
              ctx.globalAlpha = alpha * 0.7
              ctx.translate(e.x, e.y)
              ctx.rotate(e.life * 0.5)
              // 旋转光圈
              for (let i = 0; i < 4; i++) {
                ctx.rotate(Math.PI / 2)
                ctx.beginPath()
                ctx.arc(30, 0, 15, 0, Math.PI * 2)
                ctx.stroke()
              }
            }

            ctx.restore()
          }
          ctx.shadowBlur = 0
          ctx.globalAlpha = 1
        }
      }

      // ==================== 角色类 ====================
      class Fighter {
        constructor(charId, x, y, isPlayer, game) {
          const char = CHARACTERS[charId]
          this.charId = charId
          this.name = char.name
          this.color = char.color
          this.avatarType = char.avatarType
          this.avatar = char.avatar
          this.bodyColor = char.bodyColor
          this.outfitColor = char.outfitColor
          this.x = x
          this.y = y
          this.vx = 0
          this.vy = 0
          this.width = 55
          this.height = 100
          this.facing = isPlayer ? 1 : -1
          this.isPlayer = isPlayer
          this.game = game

          this.maxHealth = char.maxHealth
          this.health = char.maxHealth
          this.speed = char.speed
          this.energy = 0
          this.maxEnergy = 100

          this.state = 'idle'
          this.stateTimer = 0
          this.onGround = false
          this.crouching = false

          this.hitStun = 0
          this.invincible = 0
          this.charging = false

          this.moves = char.moves
          this.ult = char.ult

          this.combo = 0
          this.comboTimer = 0

          // 双击检测
          this.lastLeftPress = 0
          this.lastRightPress = 0
          this.dashCooldown = 0

          this.avatarImg = null
          if (this.avatarType === 'image') {
            this.avatarImg = new Image()
            this.avatarImg.src = this.avatar
          }
        }

        update(input, opponent) {
          this.stateTimer++
          if (this.hitStun > 0) this.hitStun--
          if (this.invincible > 0) this.invincible--

          if (this.comboTimer > 0) {
            this.comboTimer--
            if (this.comboTimer <= 0) this.combo = 0
          }

          if (!this.onGround) {
            this.vy += 0.6
          }

          if (this.hitStun > 0) {
            this.x += this.vx
            this.y += this.vy
            this.vx *= 0.92 // 击飞时水平速度衰减
            this.applyGroundConstraint()
            return
          }

          if (['punch', 'kick', 'ult', 'dash'].includes(this.state)) {
            this.vx *= 0.9
            if (this.stateTimer >= this.getStateDuration()) {
              this.state = this.onGround ? 'idle' : 'jump'
            }
            this.applyPhysics()
            return
          }

          if (this.isPlayer) {
            this.handlePlayerInput(input)
          } else {
            this.handleAI(opponent)
          }

          this.applyPhysics()
        }

        handlePlayerInput(input) {
          if (this.dashCooldown > 0) this.dashCooldown--

          if (input.isDown('KeyD') || this.charging) {
            this.charging = input.isDown('KeyD')
            if (this.charging && this.onGround) {
              this.state = 'idle'
              this.vx *= 0.8
              if (this.energy < this.maxEnergy) {
                this.energy += 0.5
              }
              return
            }
          }

          let moveLeft = input.isDown('ArrowLeft') || input.isDown('KeyA')
          let moveRight = input.isDown('ArrowRight') || input.isDown('KeyD')
          let moveUp = input.isDown('ArrowUp') || input.isDown('KeyW')
          let moveDown = input.isDown('ArrowDown') || input.isDown('KeyS')

          this.crouching = moveDown && this.onGround

          // 双击检测 - 闪避
          const now = Date.now()
          const DOUBLE_PRESS_TIME = 250 // 250ms内算双击

          if (input.isPressed('ArrowLeft') || input.isPressed('KeyA')) {
            if (now - this.lastLeftPress < DOUBLE_PRESS_TIME && this.dashCooldown <= 0) {
              this.performDash(-1)
              return
            }
            this.lastLeftPress = now
          }

          if (input.isPressed('ArrowRight') || input.isPressed('KeyD')) {
            if (now - this.lastRightPress < DOUBLE_PRESS_TIME && this.dashCooldown <= 0) {
              this.performDash(1)
              return
            }
            this.lastRightPress = now
          }

          if (moveLeft && !this.crouching) {
            this.vx = -this.speed
            this.facing = -1
            if (this.onGround) this.state = 'run'
          } else if (moveRight && !this.crouching) {
            this.vx = this.speed
            this.facing = 1
            if (this.onGround) this.state = 'run'
          } else {
            this.vx *= 0.8
            if (this.onGround && this.state === 'run') this.state = 'idle'
          }

          if (
            (input.isPressed('ArrowUp') || input.isPressed('KeyW')) &&
            this.onGround
          ) {
            this.vy = -14
            this.onGround = false
            this.state = 'jump'
          }

          if (input.isPressed('KeyJ') || input.isPressed('KeyZ')) {
            this.performAttack('punch', moveDown, moveUp, !this.onGround)
          }

          if (input.isPressed('KeyK') || input.isPressed('KeyX')) {
            this.performAttack('kick', moveDown, moveUp, !this.onGround)
          }

          if (
            (input.isPressed('KeyL') ||
              input.isPressed('KeyC') ||
              input.isPressed('KeyF')) &&
            this.energy >= 50
          ) {
            this.performUlt()
          }
        }

        handleAI(opponent) {
          const dist = opponent.x - this.x
          const absDist = Math.abs(dist)
          this.facing = dist > 0 ? 1 : -1

          if (this.hitStun > 0) return
          if (this.dashCooldown > 0) this.dashCooldown--

          // AI闪避 - 当对手攻击时有一定概率闪避
          if ((opponent.state === 'punch' || opponent.state === 'kick') && 
              opponent.stateTimer < 5 && absDist < 100 && 
              Math.random() < 0.25 && this.dashCooldown <= 0) {
            // 向相反方向闪避
            this.performDash(this.facing > 0 ? -1 : 1)
            return
          }

          if (this.energy >= 50 && Math.random() < 0.02) {
            this.performUlt()
            return
          }

          if (absDist > 100) {
            this.vx = this.facing * this.speed * 0.8
            if (this.onGround) this.state = 'run'
          } else if (absDist < 80) {
            this.vx *= 0.5
            if (Math.random() < 0.06) {
              const attacks = ['punch', 'punch', 'kick']
              const attack = attacks[Math.floor(Math.random() * attacks.length)]
              const down = Math.random() < 0.3
              const up = !down && Math.random() < 0.3
              const air = !this.onGround
              this.performAttack(attack, down, up, air)
            } else if (this.energy < 30 && Math.random() < 0.03) {
              this.charging = true
              this.energy += 1
            } else {
              this.charging = false
            }
          }

          if (this.onGround && Math.random() < 0.015) {
            this.vy = -14
            this.onGround = false
            this.state = 'jump'
          }

          if (this.x < 100) this.vx = Math.max(this.vx, 2)
          if (this.x > this.game.width - 100) this.vx = Math.min(this.vx, -2)
        }

        performAttack(type, down, up, air) {
          this.state = type
          this.stateTimer = 0
          this.charging = false

          let moveData
          if (air) {
            moveData = this.moves.airKick
          } else if (down) {
            moveData = this.moves.downPunch
          } else if (up) {
            moveData = this.moves.upPunch
          } else {
            moveData = this.moves[type]
          }

          this.currentMove = moveData

          // 只有玩家显示技能名称
          if (this.isPlayer) {
            this.game.showMoveName(moveData.name, moveData.color)
          }

          // 普通拳/腿 发射广播
          if (!air && !down && !up) {
            const px = this.x + this.facing * 40
            const py = this.y + this.height * 0.4
            this.game.projectiles.add(type, px, py, this.facing, this.charId)
          }

          // 特效 - 根据攻击类型生成不同特效
          const hitX = this.x + this.facing * 60
          const hitY = this.y + this.height * 0.5
          
          // 华丽的击中特效
          this.game.effects.addHitSpark(hitX, hitY, moveData.color)
          
          // 普攻也有不同特效
          if (!air && !down && !up) {
            // 连击特效 - 根据连击数增加效果
            const comboLevel = Math.min(this.combo, 3)
            if (comboLevel >= 2) {
              // 2连击以上增加光圈
              this.game.effects.addComboEffect(hitX, hitY, moveData.color, comboLevel)
            }
          }
          
          // 方向组合技额外特效
          if (down || up || air) {
            this.game.effects.addSpecialEffect(hitX, hitY, moveData.color, type, down, up, air)
          }
        }

        performDash(direction) {
          this.state = 'dash'
          this.stateTimer = 0
          this.dashCooldown = 60 // 1秒冷却
          this.facing = direction
          this.vx = direction * 18 // 快速冲刺
          this.invincible = 25 // 闪避期间无敌
          this.onGround = true // 保持地面状态
          
          if (this.isPlayer) {
            this.game.showMoveName('闪!', '#00ffff')
          }
          
          // 闪避特效
          this.game.particles.emit(this.x, this.y + this.height * 0.5, '#00ffff', 15, 8, 20)
          this.game.effects.addHitSpark(this.x, this.y + this.height * 0.5, '#00ffff')
        }

        performUlt() {
          this.state = 'ult'
          this.stateTimer = 0
          this.energy -= 50
          this.charging = false

          // 只有玩家显示大招名称
          if (this.isPlayer) {
            this.game.showMoveName(this.ult.name, this.ult.color)
          }

          this.game.effects.addUltimate(
            this.charId,
            this.x,
            this.y,
            this.facing,
            this.isPlayer,
          )
          this.game.screenShake = 25
        }

        getStateDuration() {
          if (this.state === 'punch') return 18
          if (this.state === 'kick') return 22
          if (this.state === 'ult') return 80
          if (this.state === 'dash') return 20
          return 10
        }

        checkProjectileHit(projectile) {
          if (projectile.facing === this.facing) return false
          const dist = Math.hypot(
            projectile.x - this.x,
            projectile.y - (this.y + this.height / 2),
          )
          return dist < projectile.size + this.width / 2
        }

        takeDamage(damage, knockbackX, knockbackY) {
          if (this.invincible > 0) return

          this.health -= damage
          this.hitStun = 18
          this.invincible = 35
          this.vx = knockbackX * 2
          if (knockbackY) {
            this.vy = knockbackY
          }
          // 确保被击飞时能受到重力影响
          this.onGround = false

          this.game.particles.emitRect(
            this.x,
            this.y + this.height * 0.5,
            '#ff0000',
            15,
            10,
            8,
            20,
          )

          if (this.health <= 0) {
            this.health = 0
          }
        }

        applyPhysics() {
          this.x += this.vx
          this.y += this.vy
          this.applyGroundConstraint()
        }

        applyGroundConstraint() {
          const groundY = this.game.height - 50
          if (this.y + this.height >= groundY) {
            this.y = groundY - this.height
            this.vy = 0
            this.onGround = true
            if (['jump', 'airKick'].includes(this.state)) {
              this.state = 'idle'
            }
          } else {
            // 在空中时明确设置 onGround 为 false
            this.onGround = false
          }
          
          // 防止飞出屏幕顶部太远
          if (this.y < -400) {
            this.y = -400
            this.vy = 0
          }
          
          // 闪避时保持在地面
          if (this.state === 'dash') {
            this.y = groundY - this.height
            this.vy = 0
            this.onGround = true
          }
          
          this.x = Math.max(50, Math.min(this.game.width - 50, this.x))
        }

        draw(ctx) {
          ctx.save()

          if (
            this.invincible > 0 &&
            Math.floor(this.invincible / 3) % 2 === 0
          ) {
            ctx.globalAlpha = 0.5
          }

          if (this.charging) {
            ctx.save()
            ctx.strokeStyle = '#ffcc00'
            ctx.lineWidth = 3
            ctx.setLineDash([5, 5])
            ctx.beginPath()
            ctx.arc(
              this.x,
              this.y + this.height * 0.5,
              45 + Math.sin(this.stateTimer * 0.3) * 5,
              0,
              Math.PI * 2,
            )
            ctx.stroke()
            ctx.restore()
          }

          ctx.translate(this.x, this.y + this.height)

          const scaleY = this.crouching ? 0.75 : 1
          ctx.scale(1, scaleY)

          this.drawDetailedCharacter(ctx)

          ctx.restore()
        }

        drawDetailedCharacter(ctx) {
          const walkCycle = this.state === 'run' ? Math.sin(this.stateTimer * 0.4) : 0
          const isPunching = this.state === 'punch'
          const isKicking = this.state === 'kick'
          const isDashing = this.state === 'dash'
          const isAttacking = isPunching || isKicking
          const attackFrame = isAttacking ? this.stateTimer / this.getStateDuration() : 0

          // 身体发光效果
          if (isAttacking || isDashing) {
            ctx.shadowBlur = 25
            ctx.shadowColor = this.currentMove ? this.currentMove.color : this.color
          }

          // 踢腿时腿部动画
          let leftLegExtend = 0, rightLegExtend = 0
          let leftLegAngle = 0, rightLegAngle = 0
          
          if (isKicking) {
            // 踢腿动作 - 右腿向前踢
            const kickProgress = Math.sin(attackFrame * Math.PI) // 0->1->0
            rightLegExtend = kickProgress * 50
            rightLegAngle = kickProgress * 0.5
            leftLegAngle = -kickProgress * 0.2 // 左腿支撑弯曲
          } else if (isDashing) {
            // 闪避动作 - 双腿弯曲
            leftLegAngle = -0.3
            rightLegAngle = 0.3
          }

          ctx.strokeStyle = '#333'
          ctx.lineWidth = 12
          ctx.lineCap = 'round'

          // 左腿（支撑腿）
          const leftLegX = -15 + walkCycle * 10 + leftLegExtend * Math.cos(leftLegAngle)
          const leftLegY = -20 + leftLegExtend * Math.sin(leftLegAngle)
          ctx.beginPath()
          ctx.moveTo(-10, -40)
          ctx.lineTo(leftLegX, leftLegY)
          ctx.lineTo(leftLegX - 5 + leftLegAngle * 10, 0)
          ctx.stroke()

          // 右腿（攻击腿/踢腿）
          const rightLegX = 15 - walkCycle * 10 + rightLegExtend * Math.cos(rightLegAngle)
          const rightLegY = -20 + rightLegExtend * Math.sin(rightLegAngle)
          ctx.beginPath()
          ctx.moveTo(10, -40)
          ctx.lineTo(rightLegX, rightLegY)
          ctx.lineTo(rightLegX + 5 + rightLegAngle * 10, 0)
          ctx.stroke()

          // 鞋子
          ctx.fillStyle = '#222'
          ctx.fillRect(leftLegX - 12, -5, 15, 8)
          ctx.fillRect(rightLegX - 3, -5, 15, 8)

          // 踢腿时的脚影特效
          if (isKicking && attackFrame < 0.6) {
            ctx.save()
            ctx.strokeStyle = this.currentMove ? this.currentMove.color : '#fff'
            ctx.lineWidth = 4
            ctx.globalAlpha = 0.6 - attackFrame
            ctx.beginPath()
            ctx.arc(rightLegX, rightLegY + 20, 25 + attackFrame * 30, 0, Math.PI * 2)
            ctx.stroke()
            ctx.restore()
          }

          // 身体/衣服
          const outfitGrad = ctx.createLinearGradient(0, -70, 0, -30)
          outfitGrad.addColorStop(0, this.outfitColor)
          outfitGrad.addColorStop(1, this.darkenColor(this.outfitColor, 30))
          ctx.fillStyle = outfitGrad

          // 身体形状
          ctx.beginPath()
          ctx.roundRect(-22, -70, 44, 45, 8)
          ctx.fill()

          // 衣服细节
          ctx.strokeStyle = this.darkenColor(this.outfitColor, 50)
          ctx.lineWidth = 2
          ctx.beginPath()
          ctx.moveTo(0, -70)
          ctx.lineTo(0, -25)
          ctx.stroke()

          // 腰带
          ctx.fillStyle = '#444'
          ctx.fillRect(-22, -30, 44, 8)

          // 手臂 - 出拳时动胳膊，踢腿时胳膊保持平衡
          ctx.lineWidth = 10
          let armExtend = 0
          
          if (isPunching) {
            armExtend = Math.sin(attackFrame * Math.PI) * 45
          } else if (isKicking) {
            // 踢腿时胳膊向后平衡
            armExtend = -20 * Math.sin(attackFrame * Math.PI)
          }

          // 左臂
          ctx.strokeStyle = this.bodyColor
          ctx.beginPath()
          ctx.moveTo(-18, -60)
          ctx.lineTo(-30 + armExtend * 0.2, -40)
          ctx.stroke()

          // 右臂（出拳用）
          ctx.beginPath()
          ctx.moveTo(18, -60)
          ctx.lineTo(30 + armExtend, -45 + (isPunching ? -5 : 0))
          ctx.stroke()

          // 拳头
          ctx.fillStyle = this.bodyColor
          const fistX = 30 + armExtend
          const fistY = -45 + (isPunching ? -5 : 0)
          ctx.beginPath()
          ctx.arc(this.facing > 0 ? fistX : -fistX, fistY, 10, 0, Math.PI * 2)
          ctx.fill()

          // 出拳特效
          if (isPunching && attackFrame < 0.5) {
            ctx.save()
            ctx.strokeStyle = this.currentMove ? this.currentMove.color : '#fff'
            ctx.lineWidth = 4
            ctx.globalAlpha = 0.8 - attackFrame * 1.6
            // 多层拳影
            for (let i = 1; i <= 3; i++) {
              ctx.beginPath()
              ctx.arc(this.facing > 0 ? fistX - i * 15 : -fistX + i * 15, fistY, 
                15 + i * 8 + attackFrame * 20, 0, Math.PI * 2)
              ctx.stroke()
            }
            // 冲击线
            ctx.strokeStyle = '#fff'
            ctx.lineWidth = 2
            ctx.beginPath()
            ctx.moveTo(this.facing > 0 ? fistX : -fistX, fistY - 20)
            ctx.lineTo(this.facing > 0 ? fistX + 60 : -fistX - 60, fistY)
            ctx.lineTo(this.facing > 0 ? fistX : -fistX, fistY + 20)
            ctx.fill()
            ctx.restore()
          }

          // 头部
          ctx.shadowBlur = 0
          const headY = -82

          // 脖子
          ctx.fillStyle = this.bodyColor
          ctx.fillRect(-8, -75, 16, 10)

          // 头型
          ctx.beginPath()
          ctx.arc(0, headY, 22, 0, Math.PI * 2)
          ctx.fill()

          // 绘制头像
          if (this.avatarType === 'image' && this.avatarImg && this.avatarImg.complete) {
            ctx.save()
            ctx.beginPath()
            ctx.arc(0, headY, 20, 0, Math.PI * 2)
            ctx.clip()
            ctx.scale(this.facing, 1)
            ctx.drawImage(this.avatarImg, -20, headY - 20, 40, 40)
            ctx.restore()

            ctx.strokeStyle = this.color
            ctx.lineWidth = 3
            ctx.beginPath()
            ctx.arc(0, headY, 22, 0, Math.PI * 2)
            ctx.stroke()
          } else {
            ctx.save()
            ctx.scale(this.facing, 1)
            ctx.font = '32px Arial'
            ctx.textAlign = 'center'
            ctx.textBaseline = 'middle'
            ctx.fillText(this.avatar, 0, headY)
            ctx.restore()

            ctx.strokeStyle = this.color
            ctx.lineWidth = 3
            ctx.shadowBlur = 15
            ctx.shadowColor = this.color
            ctx.beginPath()
            ctx.arc(0, headY, 24, 0, Math.PI * 2)
            ctx.stroke()
          }

          // 闪避残影效果
          if (isDashing) {
            ctx.save()
            ctx.globalAlpha = 0.4
            ctx.translate(-this.facing * 30, 0)
            ctx.fillStyle = this.outfitColor
            ctx.beginPath()
            ctx.roundRect(-22, -70, 44, 45, 8)
            ctx.fill()
            ctx.restore()
          }

          ctx.shadowBlur = 0
        }

        darkenColor(color, percent) {
          const num = parseInt(color.replace('#', ''), 16)
          const amt = Math.round(2.55 * percent)
          const R = Math.max((num >> 16) - amt, 0)
          const G = Math.max(((num >> 8) & 0x00ff) - amt, 0)
          const B = Math.max((num & 0x0000ff) - amt, 0)
          return (
            '#' +
            (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1)
          )
        }
      }

      // ==================== 游戏主类 ====================
      class Game {
        constructor() {
          this.canvas = document.getElementById('gameCanvas')
          this.ctx = this.canvas.getContext('2d')
          this.width = 1280
          this.height = 720
          this.canvas.width = this.width
          this.canvas.height = this.height

          this.input = new InputHandler()
          this.particles = new ParticleSystem()
          this.effects = new EffectSystem()
          this.projectiles = new ProjectileSystem()

          this.playerChar = null
          this.cpuChar = null
          this.player = null
          this.cpu = null

          this.gameState = 'select'
          this.timer = 60
          this.timerInterval = null
          this.screenShake = 0

          this.setupUI()
          this.loop()
        }

        setupUI() {
          const grid = document.getElementById('charGrid')
          const hint = document.getElementById('selectHint')
          const startBtn = document.getElementById('startBtn')

          Object.values(CHARACTERS).forEach((char) => {
            const card = document.createElement('div')
            card.className = 'char-card'

            let avatarHtml
            if (char.avatarType === 'image') {
              avatarHtml = `<img src="${char.avatar}" style="width:100%;height:100%;object-fit:cover">`
            } else {
              avatarHtml = char.avatar
            }

            card.innerHTML = `
                        <div class="char-avatar" style="background: ${char.color}40; border: 3px solid ${char.color}">${avatarHtml}</div>
                        <div class="char-name">${char.name}</div>
                    `
            card.addEventListener('click', () => {
              if (!this.playerChar) {
                this.playerChar = char.id
                card.classList.add('selected')
                hint.textContent = '请选择对手'
              } else if (!this.cpuChar && char.id !== this.playerChar) {
                this.cpuChar = char.id
                card.classList.add('selected')
                hint.textContent = `${CHARACTERS[this.playerChar].name} VS ${char.name}`
                startBtn.disabled = false
              }
            })
            grid.appendChild(card)
          })

          startBtn.addEventListener('click', () => {
            document.getElementById('charSelect').classList.add('hidden')
            this.startGame()
          })

          document
            .getElementById('restartBtn')
            .addEventListener('click', () => {
              location.reload()
            })

          document
            .getElementById('endingRestartBtn')
            .addEventListener('click', () => {
              location.reload()
            })

          this.setupMobileControls()
        }

        setupMobileControls() {
          const buttons = [
            ['btnUp', 'ArrowUp'],
            ['btnDown', 'ArrowDown'],
            ['btnLeft', 'ArrowLeft'],
            ['btnRight', 'ArrowRight'],
            ['btnPunch', 'KeyJ'],
            ['btnKick', 'KeyK'],
            ['btnCharge', 'KeyD'],
            ['btnUlt', 'KeyL'],
          ]

          buttons.forEach(([id, code]) => {
            const btn = document.getElementById(id)
            if (!btn) return

            let touchId = null

            const onTouchStart = (e) => {
              e.preventDefault()
              if (touchId === null) {
                touchId = e.changedTouches[0].identifier
                this.input.keys[code] = true
                if (code !== 'KeyD') this.input.keysPressed[code] = true
                btn.classList.add('pressed')
              }
            }

            const onTouchEnd = (e) => {
              e.preventDefault()
              for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === touchId) {
                  touchId = null
                  this.input.keys[code] = false
                  this.input.keysPressed[code] = false
                  btn.classList.remove('pressed')
                  break
                }
              }
            }

            btn.addEventListener('touchstart', onTouchStart, { passive: false })
            btn.addEventListener('touchend', onTouchEnd, { passive: false })
            btn.addEventListener('touchcancel', onTouchEnd, { passive: false })
          })
        }

        startGame() {
          this.gameState = 'playing'
          this.player = new Fighter(this.playerChar, 300, 400, true, this)
          this.cpu = new Fighter(
            this.cpuChar,
            this.width - 300,
            400,
            false,
            this,
          )

          document.getElementById('p1Name').textContent = this.player.name
          document.getElementById('p2Name').textContent = this.cpu.name

          this.timerInterval = setInterval(() => {
            if (this.gameState === 'playing') {
              this.timer--
              document.getElementById('timer').textContent = this.timer
              if (this.timer <= 0) {
                this.endGame()
              }
            }
          }, 1000)
        }

        showMoveName(name, color) {
          // 只显示玩家技能名称，在屏幕左侧
          const el = document.createElement('div')
          el.className = 'move-name'
          el.textContent = name
          el.style.color = color
          document.getElementById('ui').appendChild(el)
          setTimeout(() => el.remove(), 1200)
        }

        endGame() {
          this.gameState = 'end'
          clearInterval(this.timerInterval)

          if (this.player.health > this.cpu.health) {
            // 玩家胜利 - 进入结局动画
            this.startEnding()
          } else {
            // 失败或平局 - 直接显示结果
            const resultScreen = document.getElementById('resultScreen')
            const resultTitle = document.getElementById('resultTitle')
            resultScreen.classList.add('show')
            if (this.player.health < this.cpu.health) {
              resultTitle.textContent = '失败!'
              resultTitle.className = 'result-title lose'
            } else {
              resultTitle.textContent = '平局!'
              resultTitle.className = 'result-title'
            }
          }
        }

        startEnding() {
          this.gameState = 'ending'
          this.endingFrame = 0
          this.endingPhase = 'walk' // walk: 走向奶奶, rescue: 领着奶奶走向房子, done: 完成
          const groundY = this.height - 50
          this.cuiX = this.player.x
          this.cuiY = groundY - 100 // 翠翠的y坐标（脚底位置）
          this.grandmaX = this.width / 2
          this.grandmaY = groundY - 80 // 奶奶的y坐标（脚底位置）
          this.houseX = this.width - 200
          this.showEndingText = false
          
          // 隐藏血条UI
          document.getElementById('ui').style.display = 'none'
          if (document.getElementById('controlArea')) {
            document.getElementById('controlArea').style.display = 'none'
          }
        }

        update() {
          if (this.gameState === 'ending') {
            this.updateEnding()
            return
          }
          if (this.gameState !== 'playing') return

          if (this.screenShake > 1) this.screenShake *= 0.9

          this.player.update(this.input, this.cpu)
          this.cpu.update(null, this.player)

          // 投射物更新和碰撞
          this.projectiles.update()

          for (let i = this.projectiles.projectiles.length - 1; i >= 0; i--) {
            const p = this.projectiles.projectiles[i]

            if (p.facing > 0) {
              if (this.cpu.checkProjectileHit(p)) {
                // 基础伤害 + 连击加成
                const baseDamage = p.type === 'punch' ? 40 : 50
                const comboBonus = Math.min(this.player.combo * 5, 20)
                const damage = baseDamage + comboBonus
                this.cpu.takeDamage(damage, p.facing * 5, -3)
                this.player.combo++
                this.player.comboTimer = 60
                this.particles.emit(p.x, p.y, p.color, 10, 5, 15)
                this.projectiles.projectiles.splice(i, 1)
              }
            } else {
              if (this.player.checkProjectileHit(p)) {
                const baseDamage = p.type === 'punch' ? 40 : 50
                const comboBonus = Math.min(this.cpu.combo * 5, 20)
                const damage = baseDamage + comboBonus
                this.player.takeDamage(damage, p.facing * 5, -3)
                this.cpu.combo++
                this.cpu.comboTimer = 60
                this.particles.emit(p.x, p.y, p.color, 10, 5, 15)
                this.projectiles.projectiles.splice(i, 1)
              }
            }
          }

          // 大招直接伤害检测
          if (this.player.state === 'ult' && this.player.stateTimer === 40) {
            const dist = Math.abs(this.player.x - this.cpu.x)
            if (dist < 250) {
              this.cpu.takeDamage(
                this.player.ult.damage * 0.6,
                this.player.facing * 10,
                -8,
              )
            }
          }
          if (this.cpu.state === 'ult' && this.cpu.stateTimer === 40) {
            const dist = Math.abs(this.cpu.x - this.player.x)
            if (dist < 250) {
              this.player.takeDamage(
                this.cpu.ult.damage * 0.6,
                this.cpu.facing * 10,
                -8,
              )
            }
          }

          if (this.player.health <= 0 || this.cpu.health <= 0) {
            this.endGame()
          }

          this.particles.update()
          this.effects.update()
          this.updateUI()
        }

        updateEnding() {
          this.endingFrame++
          
          if (this.endingPhase === 'walk') {
            // 翠翠走向奶奶
            const targetX = this.grandmaX - 60
            const dx = targetX - this.cuiX
            if (Math.abs(dx) > 2) {
              this.cuiX += Math.sign(dx) * 3
            } else {
              this.endingPhase = 'rescue'
              this.endingFrame = 0
            }
          } else if (this.endingPhase === 'rescue') {
            // 领着奶奶走向房子
            const targetX = this.houseX - 100
            const dx = targetX - this.cuiX
            
            if (Math.abs(dx) > 2) {
              this.cuiX += Math.sign(dx) * 2
              this.grandmaX += Math.sign(dx) * 2
            } else {
              this.endingPhase = 'done'
              this.showEndingText = true
              // 显示结局UI
              document.getElementById('endingScreen').classList.add('show')
            }
          }
        }

        updateUI() {
          const p1Health = (this.player.health / this.player.maxHealth) * 100
          const p2Health = (this.cpu.health / this.cpu.maxHealth) * 100
          document.getElementById('p1Health').style.width = p1Health + '%'
          document.getElementById('p2Health').style.width = p2Health + '%'

          const p1Energy = (this.player.energy / this.player.maxEnergy) * 100
          const p2Energy = (this.cpu.energy / this.cpu.maxEnergy) * 100
          document.getElementById('p1Energy').style.width = p1Energy + '%'
          document.getElementById('p2Energy').style.width = p2Energy + '%'

          const ultBtn = document.getElementById('btnUlt')
          if (ultBtn) {
            ultBtn.classList.toggle('ready', this.player.energy >= 50)
          }

          const chargeBtn = document.getElementById('btnCharge')
          if (chargeBtn) {
            chargeBtn.classList.toggle('charging', this.player.charging)
          }
        }

        draw() {
          this.ctx.fillStyle = '#0a0a1a'
          this.ctx.fillRect(0, 0, this.width, this.height)

          this.ctx.save()
          if (this.screenShake > 1 && this.gameState !== 'ending') {
            this.ctx.translate(
              (Math.random() - 0.5) * this.screenShake,
              (Math.random() - 0.5) * this.screenShake,
            )
          }

          this.drawBackground()

          if (this.gameState === 'ending') {
            this.drawEnding()
          } else {
            if (this.player) this.player.draw(this.ctx)
            if (this.cpu) this.cpu.draw(this.ctx)
            this.projectiles.draw(this.ctx)
            this.effects.draw(this.ctx)
            this.particles.draw(this.ctx)
          }

          this.ctx.restore()
        }

        drawEnding() {
          const ctx = this.ctx
          const groundY = this.height - 50
          
          // 绘制房子
          this.drawHouse(ctx, this.houseX, groundY)
          
          // 绘制奶奶
          this.drawGrandma(ctx, this.grandmaX, this.grandmaY)
          
          // 绘制翠翠（胜利者）
          this.drawCuiEnding(ctx, this.cuiX, this.cuiY)
          
          // 绘制连接线（手牵手）
          if (this.endingPhase === 'rescue' || this.endingPhase === 'done') {
            ctx.strokeStyle = '#ff69b4'
            ctx.lineWidth = 3
            ctx.beginPath()
            ctx.moveTo(this.cuiX + 25, this.cuiY + 60)
            ctx.lineTo(this.grandmaX - 20, this.grandmaY + 50)
            ctx.stroke()
          }
        }

        drawHouse(ctx, x, y) {
          // 房子主体
          ctx.fillStyle = '#8b4513'
          ctx.fillRect(x - 80, y - 120, 160, 120)
          
          // 屋顶
          ctx.fillStyle = '#654321'
          ctx.beginPath()
          ctx.moveTo(x - 100, y - 120)
          ctx.lineTo(x, y - 200)
          ctx.lineTo(x + 100, y - 120)
          ctx.closePath()
          ctx.fill()
          
          // 屋顶边框
          ctx.strokeStyle = '#4a3018'
          ctx.lineWidth = 4
          ctx.stroke()
          
          // 门
          ctx.fillStyle = '#4a3018'
          ctx.fillRect(x - 30, y - 60, 60, 60)
          
          // 门把手
          ctx.fillStyle = '#ffd700'
          ctx.beginPath()
          ctx.arc(x + 20, y - 30, 5, 0, Math.PI * 2)
          ctx.fill()
          
          // 窗户
          ctx.fillStyle = '#87ceeb'
          ctx.fillRect(x - 60, y - 100, 40, 40)
          ctx.fillRect(x + 20, y - 100, 40, 40)
          
          // 窗框
          ctx.strokeStyle = '#fff'
          ctx.lineWidth = 3
          ctx.strokeRect(x - 60, y - 100, 40, 40)
          ctx.strokeRect(x + 20, y - 100, 40, 40)
          ctx.beginPath()
          ctx.moveTo(x - 40, y - 100)
          ctx.lineTo(x - 40, y - 60)
          ctx.moveTo(x - 60, y - 80)
          ctx.lineTo(x - 20, y - 80)
          ctx.moveTo(x + 40, y - 100)
          ctx.lineTo(x + 40, y - 60)
          ctx.moveTo(x + 20, y - 80)
          ctx.lineTo(x + 60, y - 80)
          ctx.stroke()
        }

        drawGrandma(ctx, x, y) {
          const walkOffset = Math.sin(this.endingFrame * 0.1) * 3
          
          // 身体
          ctx.fillStyle = '#6b4423'
          ctx.fillRect(x - 20, y - 70 + walkOffset, 40, 50)
          
          // 头
          ctx.fillStyle = '#f5d0b0'
          ctx.beginPath()
          ctx.arc(x, y - 85 + walkOffset, 18, 0, Math.PI * 2)
          ctx.fill()
          
          // 白发
          ctx.fillStyle = '#ddd'
          ctx.beginPath()
          ctx.arc(x, y - 90 + walkOffset, 20, Math.PI, 0)
          ctx.fill()
          
          // 脸部（奶奶表情）
          ctx.font = '20px Arial'
          ctx.textAlign = 'center'
          ctx.fillText('👵', x, y - 80 + walkOffset)
          
          // 拐杖
          ctx.strokeStyle = '#8b4513'
          ctx.lineWidth = 4
          ctx.beginPath()
          ctx.moveTo(x + 25, y - 30 + walkOffset)
          ctx.lineTo(x + 25, y + 10)
          ctx.stroke()
          
          // 腿 - 应用走路动画
          ctx.strokeStyle = '#333'
          ctx.lineWidth = 8
          ctx.lineCap = 'round'
          const legOffset1 = Math.sin(this.endingFrame * 0.1) * 5
          const legOffset2 = Math.sin(this.endingFrame * 0.1 + Math.PI) * 5
          ctx.beginPath()
          ctx.moveTo(x - 10, y - 20)
          ctx.lineTo(x - 10 + legOffset1, y + 25)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(x + 10, y - 20)
          ctx.lineTo(x + 10 + legOffset2, y + 25)
          ctx.stroke()
        }

        drawCuiEnding(ctx, x, y) {
          const walkOffset = Math.sin(this.endingFrame * 0.15) * 5
          const legLength = 45
          
          // 腿
          ctx.strokeStyle = '#333'
          ctx.lineWidth = 10
          ctx.lineCap = 'round'
          ctx.beginPath()
          ctx.moveTo(x - 12, y - 40)
          ctx.lineTo(x - 15 + walkOffset, y - 40 + legLength)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(x + 12, y - 40)
          ctx.lineTo(x + 15 - walkOffset, y - 40 + legLength)
          ctx.stroke()
          
          // 身体
          const outfitGrad = ctx.createLinearGradient(0, y - 70, 0, y - 30)
          outfitGrad.addColorStop(0, '#ff1493')
          outfitGrad.addColorStop(1, '#ff69b4')
          ctx.fillStyle = outfitGrad
          ctx.beginPath()
          ctx.roundRect(x - 22, y - 70, 44, 45, 8)
          ctx.fill()
          
          // 腰带
          ctx.fillStyle = '#ffd700'
          ctx.fillRect(x - 22, y - 35, 44, 8)
          
          // 手臂（牵着奶奶）
          ctx.strokeStyle = '#f5d0b0'
          ctx.lineWidth = 10
          ctx.beginPath()
          ctx.moveTo(x - 18, y - 60)
          ctx.lineTo(x - 30, y - 40)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(x + 18, y - 60)
          ctx.lineTo(x + 35, y - 35)
          ctx.stroke()
          
          // 头
          ctx.fillStyle = '#f5d0b0'
          ctx.beginPath()
          ctx.arc(x, y - 82, 22, 0, Math.PI * 2)
          ctx.fill()
          
          // 翠翠头像
          if (this.player && this.player.avatarImg && this.player.avatarImg.complete) {
            ctx.save()
            ctx.beginPath()
            ctx.arc(x, y - 82, 20, 0, Math.PI * 2)
            ctx.clip()
            ctx.drawImage(this.player.avatarImg, x - 20, y - 102, 40, 40)
            ctx.restore()
            
            ctx.strokeStyle = '#ff69b4'
            ctx.lineWidth = 3
            ctx.beginPath()
            ctx.arc(x, y - 82, 22, 0, Math.PI * 2)
            ctx.stroke()
          } else {
            ctx.font = '32px Arial'
            ctx.textAlign = 'center'
            ctx.fillText('🌸', x, y - 75)
            
            ctx.strokeStyle = '#ff69b4'
            ctx.lineWidth = 3
            ctx.shadowBlur = 15
            ctx.shadowColor = '#ff69b4'
            ctx.beginPath()
            ctx.arc(x, y - 82, 24, 0, Math.PI * 2)
            ctx.stroke()
            ctx.shadowBlur = 0
          }
        }

        drawBackground() {
          const groundY = this.height - 50

          // 背景渐变
          const bgGrad = this.ctx.createLinearGradient(0, 0, 0, this.height)
          bgGrad.addColorStop(0, '#1a0a2e')
          bgGrad.addColorStop(0.5, '#0d0d1a')
          bgGrad.addColorStop(1, '#1a1a2e')
          this.ctx.fillStyle = bgGrad
          this.ctx.fillRect(0, 0, this.width, this.height)

          // 远景装饰线
          this.ctx.strokeStyle = 'rgba(255,255,255,0.03)'
          this.ctx.lineWidth = 2
          for (let i = 0; i < this.width; i += 150) {
            this.ctx.beginPath()
            this.ctx.moveTo(i, 0)
            this.ctx.lineTo(i - 100, this.height)
            this.ctx.stroke()
          }

          // 地面
          const groundGrad = this.ctx.createLinearGradient(
            0,
            groundY,
            0,
            this.height,
          )
          groundGrad.addColorStop(0, '#2a2a3a')
          groundGrad.addColorStop(1, '#1a1a2a')
          this.ctx.fillStyle = groundGrad
          this.ctx.fillRect(0, groundY, this.width, 50)

          // 地面光效线
          this.ctx.strokeStyle = 'rgba(100,100,150,0.3)'
          this.ctx.lineWidth = 2
          this.ctx.beginPath()
          this.ctx.moveTo(0, groundY)
          this.ctx.lineTo(this.width, groundY)
          this.ctx.stroke()

          // 地面纹理
          this.ctx.strokeStyle = 'rgba(255,255,255,0.05)'
          this.ctx.lineWidth = 1
          for (let i = 0; i < this.width; i += 100) {
            this.ctx.beginPath()
            this.ctx.moveTo(i, groundY)
            this.ctx.lineTo(i - 50, this.height)
            this.ctx.stroke()
          }
        }

        loop() {
          this.update()
          this.draw()
          requestAnimationFrame(() => this.loop())
        }
      }

      const game = new Game()
    </script>
  </body>
