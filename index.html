<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>翠翠复仇之路</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
        }

        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #gameCanvas {
            width: 100%;
            height: 60vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
            display: block;
        }

        /* 控制区域 */
        #controlArea {
            width: 100%;
            height: 40vh;
            min-height: 280px;
            background: linear-gradient(180deg, rgba(20,20,40,0.98) 0%, rgba(10,10,20,1) 100%);
            display: none;
            flex-direction: column;
            padding: 10px 15px max(15px, env(safe-area-inset-bottom));
            gap: 8px;
            border-top: 2px solid rgba(255,255,255,0.1);
        }

        @media (hover: none) and (pointer: coarse) {
            #controlArea { display: flex; }
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 1;
        }

        /* 方向键 */
        .dpad-area {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .dpad-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(100,100,100,0.3);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }

        .dpad-btn:active, .dpad-btn.pressed {
            background: rgba(0,200,255,0.4);
            border-color: #00ccff;
            transform: scale(0.95);
        }

        .dpad-up { top: 0; left: 45px; }
        .dpad-down { bottom: 0; left: 45px; }
        .dpad-left { top: 45px; left: 0; }
        .dpad-right { top: 45px; right: 0; }

        /* 技能按钮 */
        .skills-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skill-row {
            display: flex;
            gap: 12px;
        }

        .skill-btn {
            width: 65px;
            height: 55px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            transition: all 0.1s;
        }

        .skill-btn:active, .skill-btn.pressed {
            transform: scale(0.92);
        }

        .skill-btn .label {
            font-size: 16px;
        }

        .skill-btn .sub {
            font-size: 10px;
            opacity: 0.7;
        }

        .btn-punch {
            background: linear-gradient(135deg, rgba(255,80,80,0.4), rgba(200,50,50,0.4));
            border-color: rgba(255,100,100,0.5);
        }
        .btn-punch:active, .btn-punch.pressed {
            background: linear-gradient(135deg, rgba(255,100,100,0.6), rgba(220,70,70,0.6));
            box-shadow: 0 0 20px rgba(255,80,80,0.5);
        }

        .btn-kick {
            background: linear-gradient(135deg, rgba(80,150,255,0.4), rgba(50,100,200,0.4));
            border-color: rgba(100,170,255,0.5);
        }
        .btn-kick:active, .btn-kick.pressed {
            background: linear-gradient(135deg, rgba(100,170,255,0.6), rgba(70,120,220,0.6));
            box-shadow: 0 0 20px rgba(80,150,255,0.5);
        }

        .btn-charge {
            background: linear-gradient(135deg, rgba(255,200,50,0.4), rgba(200,150,30,0.4));
            border-color: rgba(255,220,80,0.5);
        }
        .btn-charge.charging {
            animation: chargePulse 0.3s ease-in-out infinite;
        }
        @keyframes chargePulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,200,50,0.5); }
            50% { box-shadow: 0 0 30px rgba(255,220,80,0.8); }
        }

        .btn-ult {
            background: linear-gradient(135deg, rgba(200,50,255,0.4), rgba(150,30,200,0.4));
            border-color: rgba(220,80,255,0.5);
            width: 140px;
        }
        .btn-ult.ready {
            animation: ultReady 0.5s ease-in-out infinite;
        }
        @keyframes ultReady {
            0%, 100% { box-shadow: 0 0 15px rgba(200,50,255,0.6); }
            50% { box-shadow: 0 0 40px rgba(255,100,255,0.9); }
        }

        /* PC 控制说明 */
        .pc-controls {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px 15px;
            display: none;
            z-index: 100;
        }

        @media (min-width: 1024px) {
            #gameCanvas { height: 100vh; }
            .pc-controls { display: block; }
        }

        .pc-key-row {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 3px 0;
        }

        .pc-key-row .key {
            display: inline-block;
            min-width: 22px;
            padding: 2px 6px;
            background: rgba(100,100,100,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
            text-align: center;
        }

        /* UI 层 */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            pointer-events: none;
        }

        @media (min-width: 1024px) {
            #ui { height: 100vh; }
        }

        /* 血条 */
        .health-bar-container {
            position: absolute;
            top: 15px;
            width: 35%;
            max-width: 300px;
        }

        .health-bar-container.left { left: 20px; }
        .health-bar-container.right { right: 20px; }

        .player-name {
            color: white;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        .health-bar-container.right .player-name {
            text-align: right;
        }

        .health-bar {
            height: 16px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .health-fill {
            height: 100%;
            transition: width 0.2s;
            border-radius: 6px;
        }

        .health-bar-container.left .health-fill {
            background: linear-gradient(90deg, #ff3333, #ff6666);
        }

        .health-bar-container.right .health-fill {
            background: linear-gradient(90deg, #ff6666, #ff3333);
        }

        /* 能量条 */
        .energy-bar {
            margin-top: 6px;
            height: 8px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            transition: width 0.1s;
        }

        /* 计时器 */
        .timer {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* 技能名称 */
        .move-name {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(24px, 6vw, 48px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px currentColor;
            pointer-events: none;
            animation: moveNameAnim 1s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes moveNameAnim {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
        }

        /* 角色选择界面 */
        .char-select {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            z-index: 1000;
        }

        .char-select.hidden { display: none; }

        .select-title {
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 0 0 30px rgba(255,200,0,0.5);
            margin-bottom: 10px;
            margin-top: 10px;
        }

        .select-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 20px;
        }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 600px;
            width: 100%;
        }

        .char-card {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            padding: 10px;
        }

        .char-card:hover, .char-card.selected {
            background: rgba(255,255,255,0.1);
            border-color: #ffcc00;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,200,0,0.3);
        }

        .char-card.selected {
            background: rgba(255,200,0,0.15);
        }

        .char-avatar {
            width: 70%;
            height: 70%;
            border-radius: 50%;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .char-name {
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .start-btn {
            margin-top: 25px;
            padding: 15px 60px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            border: none;
            border-radius: 30px;
            color: #000;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 30px rgba(255,200,0,0.4);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255,200,0,0.6);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 胜负界面 */
        .result-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .result-screen.show { display: flex; }

        .result-title {
            font-size: clamp(48px, 10vw, 80px);
            font-weight: 900;
            margin-bottom: 20px;
        }

        .result-title.win { color: #00ff88; text-shadow: 0 0 40px rgba(0,255,136,0.5); }
        .result-title.lose { color: #ff4444; text-shadow: 0 0 40px rgba(255,68,68,0.5); }

        .restart-btn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 18px;
            background: linear-gradient(135deg, #00ccff, #0099ff);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div id="ui">
            <div class="timer" id="timer">60</div>
            
            <div class="health-bar-container left">
                <div class="player-name" id="p1Name">玩家</div>
                <div class="health-bar">
                    <div class="health-fill" id="p1Health" style="width: 100%"></div>
                </div>
                <div class="energy-bar">
                    <div class="energy-fill" id="p1Energy" style="width: 0%"></div>
                </div>
            </div>

            <div class="health-bar-container right">
                <div class="player-name" id="p2Name">电脑</div>
                <div class="health-bar">
                    <div class="health-fill" id="p2Health" style="width: 100%"></div>
                </div>
                <div class="energy-bar">
                    <div class="energy-fill" id="p2Energy" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 角色选择 -->
        <div class="char-select" id="charSelect">
            <h1 class="select-title">🏆 翠翠复仇之路</h1>
            <p class="select-subtitle" id="selectHint">请选择玩家角色</p>
            <div class="char-grid" id="charGrid"></div>
            <button class="start-btn" id="startBtn" disabled>开始对战</button>
        </div>

        <!-- 结果界面 -->
        <div class="result-screen" id="resultScreen">
            <div class="result-title" id="resultTitle">胜利!</div>
            <button class="restart-btn" id="restartBtn">再来一局</button>
        </div>

        <!-- 移动端控制 -->
        <div id="controlArea">
            <div class="control-row">
                <div class="dpad-area">
                    <button class="dpad-btn dpad-up" id="btnUp">▲</button>
                    <button class="dpad-btn dpad-down" id="btnDown">▼</button>
                    <button class="dpad-btn dpad-left" id="btnLeft">◀</button>
                    <button class="dpad-btn dpad-right" id="btnRight">▶</button>

                        <button class="skill-btn btn-punch" id="btnPunch">

                        </button>

                            <span class="label">🦶</span>
                            <span class="sub">腿</span>
                        </button>
                    </div>
                    <div class="skill-row">
                        <button class="skill-btn btn-charge" id="btnCharge">
                            <span class="label">⚡</span>
                            <span class="sub">集气</span>
                        </button>
                        <button class="skill-btn btn-ult" id="btnUlt">
                            <span class="label">🔥</span>
                            <span class="sub">大招</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PC 控制说明 -->
        <div class="pc-controls">
            <div class="pc-key-row"><span class="key">←</span><span class="key">→</span> 移动 <span class="key">↑</span> 跳跃 <span class="key">↓</span> 下蹲</div>
            <div class="pc-key-row"><span class="key">A</span> 拳 <span class="key">S</span> 腿 <span class="key">D</span> 集气 <span class="key">F</span> 大招</div>
            <div class="pc-key-row">方向+技能 = 组合技</div>
        </div>
    </div>

    <script>
        // ==================== 角色配置 ====================
        const CHARACTERS = {

            },

                id: 'jia',

                avatar: '✨',
                maxHealth: 950,
                speed: 7,
                moves: {
                    punch: { name: '紫电掌', damage: 65, color: '#9370db' },
                    kick: { name: '幻影踢', damage: 85, color: '#8a2be2' },
                    downPunch: { name: '紫雷落地', damage: 75, color: '#9932cc' },
                    upPunch: { name: '紫电升天', damage: 80, color: '#9370db' },

                    upPunch: { name: '藤蔓缠绕', damage: 85, color: '#228b22' },
                    airKick: { name: '飞叶风暴', damage: 100, color: '#32cd32' },
                },
                ult: { name: '万木朝宗', damage: 330, color: '#006400' }
            },
            shen: {
                id: 'shen',
                name: '二婶',
                color: '#ff6347',
                avatar: '🔥',
                maxHealth: 1050,
                speed: 6,
                moves: {
                    punch: { name: '炎拳', damage: 75, color: '#ff6347' },
                    kick: { name: '火焰踢', damage: 90, color: '#ff4500' },
                    downPunch: { name: '地火爆发', damage: 85, color: '#dc143c' },
                    upPunch: { name: '炎柱升天', damage: 90, color: '#ff6347' },
                    airKick: { name: '火凤旋舞', damage: 105, color: '#ff4500' },
                },
                ult: { name: '焚天烈焰', damage: 340, color: '#dc143c' }
            }
        };

        // ==================== 输入处理 ====================
        class InputHandler {
            constructor() {
                this.keys = {};
                this.keysPressed = {};
                
                // 键盘事件
                window.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    if (!this.keysPressed[e.code]) this.keysPressed[e.code] = true;
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.code] = false;
                    this.keysPressed[e.code] = false;
                });

                // 阻止默认行为
                window.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                        e.preventDefault();
                    }
                });
            }

            isDown(code) { return !!this.keys[code]; }
            
            isPressed(code) {
                if (this.keysPressed[code]) {
                    this.keysPressed[code] = false;
                    return true;
                }
                return false;
            }
        }

        // ==================== 粒子系统 ====================
        class ParticleSystem {
            constructor() {
                this.particles = [];
            }

            emit(x, y, color, count, speed, life) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
                    const vel = speed * (0.5 + Math.random() * 0.5);
                    this.particles.push({
                        x, y,
                        vx: Math.cos(angle) * vel,
                        vy: Math.sin(angle) * vel,
                        life, maxLife: life,
                        color, size: 3 + Math.random() * 4
                    });
                }
            }

            update() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.3;
                    p.life--;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }

            draw(ctx) {
                for (const p of this.particles) {
                    const alpha = p.life / p.maxLife;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        }

        // ==================== 特效系统 ====================
        class EffectSystem {
            constructor() {
                this.effects = [];
            }

            addSlash(x, y, angle, width, color, duration) {
                this.effects.push({
                    type: 'slash', x, y, angle, width, color,
                    life: duration, maxLife: duration
                });
            }

            addUltimate(charId, x, y, facing) {
                const effects = {
                    cui: () => {
                        // 樱花风暴
                        for (let i = 0; i < 12; i++) {
                            setTimeout(() => {
                                const offset = (i - 6) * 30;
                                this.addSlash(x + offset, y, Math.PI/2, 80, '#ff69b4', 20);
                            }, i * 50);
                        }
                    },
                    fu: () => {
                        // 霸王拳 - 巨大拳头
                        this.effects.push({
                            type: 'fist', x: x + facing * 100, y, 
                            facing, color: '#4169e1',
                            life: 40, maxLife: 40, scale: 1
                        });
                    },
                    jia: () => {
                        // 紫电灭世
                        for (let i = 0; i < 8; i++) {
                            this.addSlash(x, y, (Math.PI/4) * i, 200, '#9370db', 25);
                        }
                    },
                    shu: () => {
                        // 万木朝宗
                        for (let i = 0; i < 16; i++) {
                            const angle = (Math.PI * 2 * i) / 16;
                            this.effects.push({
                                type: 'leaf', x, y, angle,
                                color: '#228b22', life: 60, maxLife: 60
                            });
                        }
                    },
                    shen: () => {
                        // 焚天烈焰
                        this.effects.push({
                            type: 'fire', x, y: y + 50,
                            color: '#ff6347', life: 60, maxLife: 60
                        });
                    }
                };
                if (effects[charId]) effects[charId]();
            }

            update() {
                for (let i = this.effects.length - 1; i >= 0; i--) {
                    const e = this.effects[i];
                    e.life--;
                    if (e.life <= 0) this.effects.splice(i, 1);
                }
            }

            draw(ctx) {
                for (const e of this.effects) {
                    const alpha = e.life / e.maxLife;
                    ctx.save();
                    
                    if (e.type === 'slash') {
                        ctx.translate(e.x, e.y);
                        ctx.rotate(e.angle);
                        ctx.strokeStyle = e.color;
                        ctx.lineWidth = 5;
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = e.color;
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.moveTo(-e.width/2, 0);
                        ctx.lineTo(e.width/2, 0);
                        ctx.stroke();
                    } else if (e.type === 'fist') {
                        ctx.translate(e.x, e.y);
                        ctx.scale(e.facing * (2 - alpha), 2 - alpha);
                        ctx.fillStyle = e.color;
                        ctx.shadowBlur = 30;
                        ctx.shadowColor = e.color;
                        ctx.globalAlpha = alpha;
                        // 绘制拳头
                        ctx.beginPath();
                        ctx.arc(0, 0, 40, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (e.type === 'leaf') {
                        const dist = (e.maxLife - e.life) * 5;
                        ctx.translate(e.x + Math.cos(e.angle) * dist, e.y + Math.sin(e.angle) * dist);
                        ctx.rotate(e.angle + e.life * 0.1);
                        ctx.fillStyle = e.color;
                        ctx.globalAlpha = alpha;
                        ctx.fillRect(-10, -5, 20, 10);
                    } else if (e.type === 'fire') {
                        ctx.translate(e.x, e.y);
                        const radius = 100 + (e.maxLife - e.life) * 3;
                        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
                        grad.addColorStop(0, `rgba(255,100,0,${alpha})`);
                        grad.addColorStop(0.5, `rgba(255,50,0,${alpha * 0.5})`);
                        grad.addColorStop(1, 'transparent');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(0, 0, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    ctx.restore();
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }

        // ==================== 角色类 ====================
        class Fighter {
            constructor(charId, x, y, isPlayer, game) {
                const char = CHARACTERS[charId];
                this.charId = charId;
                this.name = char.name;
                this.color = char.color;
                this.avatar = char.avatar;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.width = 50;
                this.height = 90;
                this.facing = isPlayer ? 1 : -1;
                this.isPlayer = isPlayer;
                this.game = game;

                this.maxHealth = char.maxHealth;
                this.health = char.maxHealth;
                this.speed = char.speed;
                this.energy = 0;
                this.maxEnergy = 100;

                this.state = 'idle';
                this.stateTimer = 0;
                this.onGround = false;
                this.crouching = false;

                this.hitStun = 0;
                this.invincible = 0;
                this.charging = false;

                this.moves = char.moves;
                this.ult = char.ult;
                
                this.combo = 0;
                this.comboTimer = 0;
            }

            update(input, opponent) {
                this.stateTimer++;
                if (this.hitStun > 0) this.hitStun--;
                if (this.invincible > 0) this.invincible--;

                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer <= 0) this.combo = 0;
                }

                // 重力
                if (!this.onGround) {
                    this.vy += 0.6;
                }

                // 状态处理
                if (this.hitStun > 0) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.applyGroundConstraint();
                    return;
                }

                // 攻击状态
                if (['punch', 'kick', 'ult'].includes(this.state)) {
                    this.vx *= 0.9;
                    if (this.stateTimer >= this.getStateDuration()) {
                        this.state = this.onGround ? 'idle' : 'jump';
                    }
                    this.applyPhysics();
                    return;
                }

                // 玩家控制
                if (this.isPlayer) {
                    this.handlePlayerInput(input);
                } else {
                    this.handleAI(opponent);
                }

                this.applyPhysics();
            }

            handlePlayerInput(input) {
                // 集气
                if (input.isDown('KeyD') || this.charging) {
                    this.charging = input.isDown('KeyD');
                    if (this.charging && this.onGround) {
                        this.state = 'idle';
                        this.vx *= 0.8;
                        if (this.energy < this.maxEnergy) {
                            this.energy += 0.5;
                        }
                        return;
                    }
                }

                // 移动
                let moveLeft = input.isDown('ArrowLeft') || input.isDown('KeyA');
                let moveRight = input.isDown('ArrowRight') || input.isDown('KeyD');
                let moveUp = input.isDown('ArrowUp') || input.isDown('KeyW');
                let moveDown = input.isDown('ArrowDown') || input.isDown('KeyS');

                // 下蹲
                this.crouching = moveDown && this.onGround;

                if (moveLeft && !this.crouching) {
                    this.vx = -this.speed;
                    this.facing = -1;
                    if (this.onGround) this.state = 'run';
                } else if (moveRight && !this.crouching) {
                    this.vx = this.speed;
                    this.facing = 1;
                    if (this.onGround) this.state = 'run';
                } else {
                    this.vx *= 0.8;
                    if (this.onGround && this.state === 'run') this.state = 'idle';
                }

                // 跳跃
                if ((input.isPressed('ArrowUp') || input.isPressed('KeyW')) && this.onGround) {
                    this.vy = -14;
                    this.onGround = false;
                    this.state = 'jump';
                }

                // 拳
                if (input.isPressed('KeyJ') || input.isPressed('KeyZ')) {
                    this.performAttack('punch', moveDown, moveUp, !this.onGround);
                }

                // 腿
                if (input.isPressed('KeyK') || input.isPressed('KeyX')) {
                    this.performAttack('kick', moveDown, moveUp, !this.onGround);
                }

                // 大招
                if ((input.isPressed('KeyL') || input.isPressed('KeyC') || input.isPressed('KeyF')) && this.energy >= 50) {
                    this.performUlt();
                }
            }

            handleAI(opponent) {
                const dist = opponent.x - this.x;
                const absDist = Math.abs(dist);

                // 面向对手
                this.facing = dist > 0 ? 1 : -1;

                // AI 行为
                if (this.hitStun > 0) return;

                // 能量足够时随机释放大招
                if (this.energy >= 50 && Math.random() < 0.02) {
                    this.performUlt();
                    return;
                }

                // 距离远时靠近
                if (absDist > 100) {
                    this.vx = this.facing * this.speed * 0.8;
                    if (this.onGround) this.state = 'run';
                }
                // 距离近时攻击
                else if (absDist < 80) {
                    this.vx *= 0.5;
                    // 随机选择攻击方式
                    if (Math.random() < 0.05) {
                        const attacks = ['punch', 'punch', 'kick'];
                        const attack = attacks[Math.floor(Math.random() * attacks.length)];
                        const down = Math.random() < 0.3;
                        const up = !down && Math.random() < 0.3;
                        const air = !this.onGround;
                        this.performAttack(attack, down, up, air);
                    }
                    // 偶尔集气
                    else if (this.energy < 30 && Math.random() < 0.03) {
                        this.charging = true;
                        this.energy += 1;
                    } else {
                        this.charging = false;
                    }
                }

                // 偶尔跳跃
                if (this.onGround && Math.random() < 0.01) {
                    this.vy = -14;
                    this.onGround = false;
                    this.state = 'jump';
                }

                // 远离边缘
                if (this.x < 100) this.vx = Math.max(this.vx, 2);
                if (this.x > this.game.width - 100) this.vx = Math.min(this.vx, -2);
            }

            performAttack(type, down, up, air) {
                this.state = type;
                this.stateTimer = 0;
                this.charging = false;

                let moveData;
                if (air) {
                    moveData = this.moves.airKick;
                } else if (down) {
                    moveData = this.moves.downPunch;
                } else if (up) {
                    moveData = this.moves.upPunch;
                } else {
                    moveData = this.moves[type];
                }

                this.currentMove = moveData;
                this.game.showMoveName(moveData.name, moveData.color);

                // 产生特效
                const hitX = this.x + this.facing * 50;
                const hitY = this.y + this.height * 0.5;
                this.game.effects.addSlash(hitX, hitY, this.facing > 0 ? 0 : Math.PI, 60, moveData.color, 10);
            }

            performUlt() {
                this.state = 'ult';
                this.stateTimer = 0;
                this.energy -= 50;
                this.charging = false;
                
                this.game.showMoveName(this.ult.name, this.ult.color);
                this.game.effects.addUltimate(this.charId, this.x, this.y + this.height * 0.5, this.facing);
                
                // 全屏震动
                this.game.screenShake = 20;
            }

            getStateDuration() {
                if (this.state === 'punch') return 15;
                if (this.state === 'kick') return 20;
                if (this.state === 'ult') return 60;
                return 10;
            }

            checkHit(opponent) {
                if (!['punch', 'kick', 'ult'].includes(this.state)) return;
                if (this.stateTimer !== 5) return;
                if (opponent.invincible > 0) return;

                const hitX = this.x + this.facing * 60;
                const hitY = this.y + this.height * 0.5;
                
                // 检测碰撞
                if (Math.abs(opponent.x - hitX) < 70 && 
                    Math.abs(opponent.y + opponent.height * 0.5 - hitY) < 60) {
                    
                    let damage = this.currentMove ? this.currentMove.damage : 50;
                    let knockbackX = this.facing * 5;
                    let knockbackY = 0;

                    // 大招
                    if (this.state === 'ult') {
                        damage = this.ult.damage;
                        knockbackX = this.facing * 15;
                        knockbackY = -10;
                    }

                    opponent.takeDamage(damage, knockbackX, knockbackY);
                    
                    // 特效
                    this.game.particles.emit(opponent.x, opponent.y + opponent.height * 0.5, 
                        this.currentMove ? this.currentMove.color : '#fff', 15, 6, 20);
                    
                    this.combo++;
                    this.comboTimer = 60;
                }
            }

            takeDamage(damage, knockbackX, knockbackY) {
                if (this.invincible > 0) return;
                
                this.health -= damage;
                this.hitStun = 15;
                this.invincible = 30;
                this.vx = knockbackX * 3;
                if (knockbackY) this.vy = knockbackY;

                // 受击特效
                this.game.particles.emit(this.x, this.y + this.height * 0.5, '#ff0000', 20, 8, 25);

                if (this.health <= 0) {
                    this.health = 0;
                }
            }

            applyPhysics() {
                this.x += this.vx;
                this.y += this.vy;
                this.applyGroundConstraint();
            }

            applyGroundConstraint() {
                const groundY = this.game.height - 50;
                if (this.y + this.height > groundY) {
                    this.y = groundY - this.height;
                    this.vy = 0;
                    if (!this.onGround) {
                        this.onGround = true;
                        if (['jump', 'airKick'].includes(this.state)) {
                            this.state = 'idle';
                        }
                    }
                }

                // 边界
                this.x = Math.max(50, Math.min(this.game.width - 50, this.x));
            }

            draw(ctx) {
                ctx.save();

                // 受击闪烁
                if (this.invincible > 0 && Math.floor(this.invincible / 3) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                // 集气特效
                if (this.charging) {
                    ctx.save();
                    ctx.strokeStyle = '#ffcc00';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y + this.height * 0.5, 40 + Math.sin(this.stateTimer * 0.3) * 5, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }

                ctx.translate(this.x, this.y + this.height);

                // 下蹲时压缩
                if (this.crouching) {
                    ctx.scale(1, 0.7);
                }

                // 绘制角色（简化版）
                this.drawCharacter(ctx);

                ctx.restore();
            }

            drawCharacter(ctx) {
                const colors = {
                    cui: { body: '#ff69b4', dark: '#d147a3' },
                    fu: { body: '#4169e1', dark: '#27408b' },
                    jia: { body: '#9370db', dark: '#7b68ee' },
                    shu: { body: '#228b22', dark: '#006400' },
                    shen: { body: '#ff6347', dark: '#dc143c' }
                };

                const c = colors[this.charId] || colors.cui;

                // 身体颜色根据状态变化
                let bodyColor = c.body;
                if (this.state === 'punch') bodyColor = '#ff8888';
                if (this.state === 'kick') bodyColor = '#8888ff';
                if (this.state === 'ult') bodyColor = '#ffff00';

                // 绘制身体
                ctx.fillStyle = bodyColor;
                ctx.fillRect(-20, -70, 40, 50);

                // 绘制头部（使用emoji代替）
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.avatar, 0, -85);

                // 绘制手臂
                ctx.fillStyle = c.dark;
                const armOffset = this.state === 'punch' ? 20 : (this.state === 'kick' ? -10 : 0);
                ctx.fillRect(this.facing * 25, -55 + armOffset, 20, 15);
                ctx.fillRect(-this.facing * 15, -55, 15, 12);

                // 绘制腿
                const legOffset = this.state === 'run' ? Math.sin(this.stateTimer * 0.5) * 10 : 0;
                ctx.fillRect(-15 + legOffset, -20, 12, 20);
                ctx.fillRect(3 - legOffset, -20, 12, 20);

                // 攻击时的拳/脚
                if (this.state === 'punch') {
                    ctx.fillStyle = '#ffaaaa';
                    ctx.beginPath();
                    ctx.arc(this.facing * 45, -50 + armOffset, 12, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.state === 'kick') {
                    ctx.fillStyle = '#aaaaff';
                    ctx.beginPath();
                    ctx.arc(this.facing * 40, -25, 15, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 血量显示
                if (this.health < this.maxHealth * 0.3) {
                    ctx.fillStyle = 'rgba(255,0,0,0.3)';
                    ctx.fillRect(-25, -110, 50, 5);
                }
            }
        }

        // ==================== 游戏主类 ====================
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 1280;
                this.height = 720;
                this.canvas.width = this.width;
                this.canvas.height = this.height;

                this.input = new InputHandler();
                this.particles = new ParticleSystem();
                this.effects = new EffectSystem();

                this.playerChar = null;
                this.cpuChar = null;
                this.player = null;
                this.cpu = null;

                this.gameState = 'select';
                this.timer = 60;
                this.timerInterval = null;
                this.screenShake = 0;

                this.setupUI();
                this.loop();
            }

            setupUI() {
                // 角色选择
                const grid = document.getElementById('charGrid');
                const hint = document.getElementById('selectHint');
                const startBtn = document.getElementById('startBtn');

                Object.values(CHARACTERS).forEach(char => {
                    const card = document.createElement('div');
                    card.className = 'char-card';
                    card.innerHTML = `
                        <div class="char-avatar" style="background: ${char.color}40; border: 3px solid ${char.color}">${char.avatar}</div>
                        <div class="char-name">${char.name}</div>
                    `;
                    card.addEventListener('click', () => {
                        if (!this.playerChar) {
                            this.playerChar = char.id;
                            card.classList.add('selected');
                            hint.textContent = '请选择对手';
                        } else if (!this.cpuChar && char.id !== this.playerChar) {
                            this.cpuChar = char.id;
                            card.classList.add('selected');
                            hint.textContent = `${CHARACTERS[this.playerChar].name} VS ${char.name}`;
                            startBtn.disabled = false;
                        }
                    });
                    grid.appendChild(card);
                });

                startBtn.addEventListener('click', () => {
                    document.getElementById('charSelect').classList.add('hidden');
                    this.startGame();
                });

                // 重新开始
                document.getElementById('restartBtn').addEventListener('click', () => {
                    location.reload();
                });

                // 移动端控制
                this.setupMobileControls();
            }

            setupMobileControls() {
                const buttons = [
                    ['btnUp', 'ArrowUp'],
                    ['btnDown', 'ArrowDown'],
                    ['btnLeft', 'ArrowLeft'],
                    ['btnRight', 'ArrowRight'],
                    ['btnPunch', 'KeyJ'],
                    ['btnKick', 'KeyK'],
                    ['btnCharge', 'KeyD'],
                    ['btnUlt', 'KeyL']
                ];

                buttons.forEach(([id, code]) => {
                    const btn = document.getElementById(id);
                    if (!btn) return;

                    let touchId = null;

                    const onTouchStart = (e) => {
                        e.preventDefault();
                        if (touchId === null) {
                            touchId = e.changedTouches[0].identifier;
                            this.input.keys[code] = true;
                            if (code !== 'KeyD') this.input.keysPressed[code] = true;
                            btn.classList.add('pressed');
                        }
                    };

                    const onTouchEnd = (e) => {
                        e.preventDefault();
                        for (let i = 0; i < e.changedTouches.length; i++) {
                            if (e.changedTouches[i].identifier === touchId) {
                                touchId = null;
                                this.input.keys[code] = false;
                                this.input.keysPressed[code] = false;
                                btn.classList.remove('pressed');
                                break;
                            }
                        }
                    };

                    btn.addEventListener('touchstart', onTouchStart, { passive: false });
                    btn.addEventListener('touchend', onTouchEnd, { passive: false });
                    btn.addEventListener('touchcancel', onTouchEnd, { passive: false });
                });
            }

            startGame() {
                this.gameState = 'playing';
                
                // 创建角色
                this.player = new Fighter(this.playerChar, 300, 400, true, this);
                this.cpu = new Fighter(this.cpuChar, this.width - 300, 400, false, this);

                // 更新UI名称
                document.getElementById('p1Name').textContent = this.player.name;
                document.getElementById('p2Name').textContent = this.cpu.name;

                // 计时器
                this.timerInterval = setInterval(() => {
                    if (this.gameState === 'playing') {
                        this.timer--;
                        document.getElementById('timer').textContent = this.timer;
                        if (this.timer <= 0) {
                            this.endGame();
                        }
                    }
                }, 1000);
            }

            showMoveName(name, color) {
                const el = document.createElement('div');
                el.className = 'move-name';
                el.textContent = name;
                el.style.color = color;
                document.getElementById('ui').appendChild(el);
                setTimeout(() => el.remove(), 1000);
            }

            endGame() {
                this.gameState = 'end';
                clearInterval(this.timerInterval);

                const resultScreen = document.getElementById('resultScreen');
                const resultTitle = document.getElementById('resultTitle');

                resultScreen.classList.add('show');

                if (this.player.health > this.cpu.health) {
                    resultTitle.textContent = '胜利!';
                    resultTitle.className = 'result-title win';
                } else if (this.player.health < this.cpu.health) {
                    resultTitle.textContent = '失败!';
                    resultTitle.className = 'result-title lose';
                } else {
                    resultTitle.textContent = '平局!';
                    resultTitle.className = 'result-title';
                }
            }

            update() {
                if (this.gameState !== 'playing') return;

                if (this.screenShake > 0) this.screenShake *= 0.9;

                this.player.update(this.input, this.cpu);
                this.cpu.update(null, this.player);

                // 检测攻击
                this.player.checkHit(this.cpu);
                this.cpu.checkHit(this.player);

                // 检查游戏结束
                if (this.player.health <= 0 || this.cpu.health <= 0) {
                    this.endGame();
                }

                this.particles.update();
                this.effects.update();
                this.updateUI();
            }

            updateUI() {
                // 血条
                const p1Health = (this.player.health / this.player.maxHealth) * 100;
                const p2Health = (this.cpu.health / this.cpu.maxHealth) * 100;
                document.getElementById('p1Health').style.width = p1Health + '%';
                document.getElementById('p2Health').style.width = p2Health + '%';

                // 能量条
                const p1Energy = (this.player.energy / this.player.maxEnergy) * 100;
                const p2Energy = (this.cpu.energy / this.cpu.maxEnergy) * 100;
                document.getElementById('p1Energy').style.width = p1Energy + '%';
                document.getElementById('p2Energy').style.width = p2Energy + '%';

                // 大招按钮状态
                const ultBtn = document.getElementById('btnUlt');
                if (ultBtn) {
                    if (this.player.energy >= 50) {
                        ultBtn.classList.add('ready');
                    } else {
                        ultBtn.classList.remove('ready');
                    }
                }

                // 集气按钮
                const chargeBtn = document.getElementById('btnCharge');
                if (chargeBtn && this.player.charging) {
                    chargeBtn.classList.add('charging');
                } else if (chargeBtn) {
                    chargeBtn.classList.remove('charging');
                }
            }

            draw() {
                // 清空画布
                this.ctx.fillStyle = '#0a0a1a';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // 震动效果
                this.ctx.save();
                if (this.screenShake > 1) {
                    this.ctx.translate(
                        (Math.random() - 0.5) * this.screenShake,
                        (Math.random() - 0.5) * this.screenShake
                    );
                }

                // 绘制背景
                this.drawBackground();

                // 绘制角色
                if (this.player) this.player.draw(this.ctx);
                if (this.cpu) this.cpu.draw(this.ctx);

                // 绘制特效
                this.effects.draw(this.ctx);
                this.particles.draw(this.ctx);

                this.ctx.restore();
            }

            drawBackground() {
                // 地面
                const groundY = this.height - 50;
                const grad = this.ctx.createLinearGradient(0, groundY, 0, this.height);
                grad.addColorStop(0, '#2a2a3a');
                grad.addColorStop(1, '#1a1a2a');
                this.ctx.fillStyle = grad;
                this.ctx.fillRect(0, groundY, this.width, 50);

                // 地面线条
                this.ctx.strokeStyle = '#444';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.moveTo(0, groundY);
                this.ctx.lineTo(this.width, groundY);
                this.ctx.stroke();

                // 装饰线条
                this.ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                for (let i = 0; i < this.width; i += 100) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i, groundY);
                    this.ctx.lineTo(i - 200, this.height);
                    this.ctx.stroke();
                }
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        // 启动游戏
        const game = new Game();
    </script>
</body>
</html>
