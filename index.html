<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>翠翠复仇之路之拯救奶奶</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
      }

      #gameContainer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      #gameCanvas {
        width: 100%;
        height: 60vh;
        background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
        display: block;
      }

      #controlArea {
        width: 100%;
        height: 40vh;
        min-height: 280px;
        background: linear-gradient(
          180deg,
          rgba(20, 20, 40, 0.98) 0%,
          rgba(10, 10, 20, 1) 100%
        );
        display: none;
        flex-direction: column;
        padding: 10px 15px max(15px, env(safe-area-inset-bottom));
        gap: 8px;
        border-top: 2px solid rgba(255, 255, 255, 0.1);
      }

      @media (hover: none) and (pointer: coarse) {
        #controlArea {
          display: flex;
        }
      }

      .control-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex: 1;
      }

      .dpad-area {
        position: relative;
        width: 140px;
        height: 140px;
      }

      .dpad-btn {
        position: absolute;
        width: 50px;
        height: 50px;
        border-radius: 12px;
        background: rgba(100, 100, 100, 0.3);
        border: 2px solid rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.1s;
      }

      .dpad-btn:active,
      .dpad-btn.pressed {
        background: rgba(0, 200, 255, 0.4);
        border-color: #00ccff;
        transform: scale(0.95);
      }

      .dpad-up {
        top: 0;
        left: 45px;
      }
      .dpad-down {
        bottom: 0;
        left: 45px;
      }
      .dpad-left {
        top: 45px;
        left: 0;
      }
      .dpad-right {
        top: 45px;
        right: 0;
      }

      .skills-area {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .skill-row {
        display: flex;
        gap: 12px;
      }

      .skill-btn {
        width: 65px;
        height: 55px;
        border-radius: 15px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 18px;
        font-weight: bold;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        transition: all 0.1s;
      }

      .skill-btn:active,
      .skill-btn.pressed {
        transform: scale(0.92);
      }

      .skill-btn .label {
        font-size: 16px;
      }
      .skill-btn .sub {
        font-size: 10px;
        opacity: 0.7;
      }

      .btn-punch {
        background: linear-gradient(
          135deg,
          rgba(255, 80, 80, 0.4),
          rgba(200, 50, 50, 0.4)
        );
        border-color: rgba(255, 100, 100, 0.5);
      }
      .btn-punch:active,
      .btn-punch.pressed {
        background: linear-gradient(
          135deg,
          rgba(255, 100, 100, 0.6),
          rgba(220, 70, 70, 0.6)
        );
        box-shadow: 0 0 20px rgba(255, 80, 80, 0.5);
      }

      .btn-kick {
        background: linear-gradient(
          135deg,
          rgba(80, 150, 255, 0.4),
          rgba(50, 100, 200, 0.4)
        );
        border-color: rgba(100, 170, 255, 0.5);
      }
      .btn-kick:active,
      .btn-kick.pressed {
        background: linear-gradient(
          135deg,
          rgba(100, 170, 255, 0.6),
          rgba(70, 120, 220, 0.6)
        );
        box-shadow: 0 0 20px rgba(80, 150, 255, 0.5);
      }

      .btn-charge {
        background: linear-gradient(
          135deg,
          rgba(255, 200, 50, 0.4),
          rgba(200, 150, 30, 0.4)
        );
        border-color: rgba(255, 220, 80, 0.5);
      }
      .btn-charge.charging {
        animation: chargePulse 0.3s ease-in-out infinite;
      }
      @keyframes chargePulse {
        0%,
        100% {
          box-shadow: 0 0 10px rgba(255, 200, 50, 0.5);
        }
        50% {
          box-shadow: 0 0 30px rgba(255, 220, 80, 0.8);
        }
      }

      .btn-ult {
        background: linear-gradient(
          135deg,
          rgba(200, 50, 255, 0.4),
          rgba(150, 30, 200, 0.4)
        );
        border-color: rgba(220, 80, 255, 0.5);
        width: 140px;
      }
      .btn-ult.ready {
        animation: ultReady 0.5s ease-in-out infinite;
      }
      @keyframes ultReady {
        0%,
        100% {
          box-shadow: 0 0 15px rgba(200, 50, 255, 0.6);
        }
        50% {
          box-shadow: 0 0 40px rgba(255, 100, 255, 0.9);
        }
      }

      .pc-controls {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 10px 15px;
        display: none;
        z-index: 100;
      }

      @media (min-width: 1024px) {
        #gameCanvas {
          height: 100vh;
        }
        .pc-controls {
          display: block;
        }
      }

      .pc-key-row {
        color: rgba(255, 255, 255, 0.8);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 3px 0;
      }

      .pc-key-row .key {
        display: inline-block;
        min-width: 22px;
        padding: 2px 6px;
        background: rgba(100, 100, 100, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 4px;
        color: #fff;
        font-weight: bold;
        text-align: center;
      }

      #ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 60vh;
        pointer-events: none;
      }

      @media (min-width: 1024px) {
        #ui {
          height: 100vh;
        }
      }

      .health-bar-container {
        position: absolute;
        top: 15px;
        width: 35%;
        max-width: 300px;
      }
      .health-bar-container.left {
        left: 20px;
      }
      .health-bar-container.right {
        right: 20px;
      }

      .player-name {
        color: white;
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 5px;
        text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
      }
      .health-bar-container.right .player-name {
        text-align: right;
      }

      .health-bar {
        height: 16px;
        background: rgba(0, 0, 0, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        overflow: hidden;
        position: relative;
      }

      .health-fill {
        height: 100%;
        transition: width 0.2s;
        border-radius: 6px;
      }

      .health-bar-container.left .health-fill {
        background: linear-gradient(90deg, #ff3333, #ff6666);
      }
      .health-bar-container.right .health-fill {
        background: linear-gradient(90deg, #ff6666, #ff3333);
      }

      .energy-bar {
        margin-top: 6px;
        height: 8px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        overflow: hidden;
      }

      .energy-fill {
        height: 100%;
        background: linear-gradient(90deg, #ffcc00, #ff9900);
        transition: width 0.1s;
      }

      .timer {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 36px;
        font-weight: 900;
        color: #fff;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      }

      .move-name {
        position: absolute;
        top: 30%;
        left: 30%;
        transform: translate(-50%, -50%);
        font-size: clamp(28px, 7vw, 56px);
        font-weight: 900;
        color: #fff;
        text-shadow:
          0 0 10px currentColor,
          0 0 20px currentColor,
          0 0 40px currentColor,
          4px 4px 0 #000;
        pointer-events: none;
        animation: moveNameAnim 1.2s ease-out forwards;
        white-space: nowrap;
        z-index: 100;
      }

      @keyframes moveNameAnim {
        0% {
          transform: translate(-50%, -50%) scale(0.2) rotate(-10deg);
          opacity: 0;
        }
        30% {
          transform: translate(-50%, -50%) scale(1.4) rotate(5deg);
          opacity: 1;
        }
        60% {
          transform: translate(-50%, -50%) scale(1.1) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(1) rotate(0deg);
          opacity: 0;
        }
      }

      .char-select {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          180deg,
          #0a0a1a 0%,
          #1a0a2e 50%,
          #0a0a1a 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        z-index: 1000;
      }

      .char-select.hidden {
        display: none;
      }

      .select-title {
        font-size: clamp(28px, 6vw, 48px);
        font-weight: 900;
        color: #ffcc00;
        text-shadow: 0 0 30px rgba(255, 200, 0, 0.5);
        margin-bottom: 10px;
        margin-top: 10px;
      }

      .select-subtitle {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 20px;
      }

      .char-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        max-width: 600px;
        width: 100%;
      }

      .char-card {
        aspect-ratio: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        padding: 10px;
      }

      .char-card:hover,
      .char-card.selected {
        background: rgba(255, 255, 255, 0.1);
        border-color: #ffcc00;
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(255, 200, 0, 0.3);
      }

      .char-card.selected {
        background: rgba(255, 200, 0, 0.15);
      }

      .char-avatar {
        width: 70%;
        height: 70%;
        border-radius: 50%;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        overflow: hidden;
      }

      .char-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .char-name {
        color: white;
        font-size: 14px;
        font-weight: bold;
      }

      .start-btn {
        margin-top: 25px;
        padding: 15px 60px;
        font-size: 20px;
        font-weight: bold;
        background: linear-gradient(135deg, #ffcc00, #ff9900);
        border: none;
        border-radius: 30px;
        color: #000;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 0 30px rgba(255, 200, 0, 0.4);
      }

      .start-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 40px rgba(255, 200, 0, 0.6);
      }

      .start-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .result-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 2000;
      }

      .result-screen.show {
        display: flex;
      }

      .result-title {
        font-size: clamp(48px, 10vw, 80px);
        font-weight: 900;
        margin-bottom: 20px;
      }

      .result-title.win {
        color: #00ff88;
        text-shadow: 0 0 40px rgba(0, 255, 136, 0.5);
      }
      .result-title.lose {
        color: #ff4444;
        text-shadow: 0 0 40px rgba(255, 68, 68, 0.5);
      }

      .restart-btn {
        margin-top: 30px;
        padding: 15px 50px;
        font-size: 18px;
        background: linear-gradient(135deg, #00ccff, #0099ff);
        border: none;
        border-radius: 25px;
        color: white;
        cursor: pointer;
        font-weight: bold;
      }

      /* 结局画面 */
      .ending-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(255,105,180,0.3) 100%);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding-bottom: 15vh;
        z-index: 2000;
        animation: endingFadeIn 1s ease-out;
      }

      @keyframes endingFadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      .ending-screen.show {
        display: flex;
      }

      .ending-title {
        font-size: clamp(32px, 8vw, 56px);
        font-weight: 900;
        color: #ff69b4;
        text-shadow: 
          0 0 20px rgba(255,105,180,0.8),
          0 0 40px rgba(255,105,180,0.5),
          4px 4px 0 #000;
        margin-bottom: 15px;
        text-align: center;
        animation: endingTitlePop 0.8s ease-out;
      }

      @keyframes endingTitlePop {
        0% { transform: scale(0.5); opacity: 0; }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); opacity: 1; }
      }

      .ending-subtitle {
        font-size: clamp(16px, 4vw, 24px);
        color: #fff;
        text-shadow: 0 0 10px rgba(0,0,0,0.8);
        margin-bottom: 40px;
        text-align: center;
        opacity: 0.9;
      }

      .ending-btn {
        background: linear-gradient(135deg, #ff69b4, #ff1493);
        box-shadow: 0 0 30px rgba(255,105,180,0.6);
        animation: endingBtnPulse 2s ease-in-out infinite;
      }

      @keyframes endingBtnPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(255,105,180,0.6); }
        50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,105,180,0.9); }
      }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <canvas id="gameCanvas"></canvas>

      <div id="ui">
        <div class="timer" id="timer">60</div>

        <div class="health-bar-container left">
          <div class="player-name" id="p1Name">玩家</div>
          <div class="health-bar">
            <div class="health-fill" id="p1Health" style="width: 100%"></div>
          </div>
          <div class="energy-bar">
            <div class="energy-fill" id="p1Energy" style="width: 0%"></div>
          </div>
        </div>

        <div class="health-bar-container right">
          <div class="player-name" id="p2Name">电脑</div>
          <div class="health-bar">
            <div class="health-fill" id="p2Health" style="width: 100%"></div>
          </div>
          <div class="energy-bar">
            <div class="energy-fill" id="p2Energy" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="char-select" id="charSelect">
        <h1 class="select-title">🏆 翠翠复仇之路</h1>
        <p class="select-subtitle" id="selectHint">请选择玩家角色</p>
        <div class="char-grid" id="charGrid"></div>
        <button class="start-btn" id="startBtn" disabled>开始对战</button>
      </div>

      <div class="result-screen" id="resultScreen">
        <div class="result-title" id="resultTitle">胜利!</div>
        <button class="restart-btn" id="restartBtn">再来一局</button>
      </div>

      <!-- 结局画面 -->
      <div class="ending-screen" id="endingScreen">
        <div class="ending-title">🎉 翠翠顺利救出了奶奶! 🎉</div>
        <div class="ending-subtitle">正义战胜了邪恶，翠翠和奶奶幸福地回家了</div>
        <button class="restart-btn ending-btn" id="endingRestartBtn">再来一局</button>
      </div>

      <div id="controlArea">
        <div class="control-row">
          <div class="dpad-area">
            <button class="dpad-btn dpad-up" id="btnUp">▲</button>
            <button class="dpad-btn dpad-down" id="btnDown">▼</button>
            <button class="dpad-btn dpad-left" id="btnLeft">◀</button>
            <button class="dpad-btn dpad-right" id="btnRight">▶</button>
          </div>
          <div class="skills-area">
            <div class="skill-row">
              <button class="skill-btn btn-punch" id="btnPunch">
                <span class="label">👊</span>
                <span class="sub">拳</span>
              </button>
              <button class="skill-btn btn-kick" id="btnKick">
                <span class="label">🦶</span>
                <span class="sub">腿</span>
              </button>
            </div>
            <div class="skill-row">
              <button class="skill-btn btn-charge" id="btnCharge">
                <span class="label">⚡</span>
                <span class="sub">集气</span>
              </button>
              <button class="skill-btn btn-ult" id="btnUlt">
                <span class="label">🔥</span>
                <span class="sub">大招</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="pc-controls">
        <div class="pc-key-row">
          <span class="key">←</span><span class="key">→</span> 移动(双击=闪)
          <span class="key">↑</span> 跳跃 <span class="key">↓</span> 下蹲
        </div>
        <div class="pc-key-row">
          <span class="key">A</span> 拳 <span class="key">S</span> 腿
          <span class="key">D</span> 集气 <span class="key">F</span> 大招
        </div>
        <div class="pc-key-row">↓+拳/腿=下段 ↑+拳/腿=上段 空中+拳/腿=空击</div>
      </div>
    </div>

    <script>

          maxHealth: 1150,

          moves: {
            punch: { name: '木龙掌', damage: 75, color: '#228b22' },
            kick: { name: '藤蔓鞭', damage: 95, color: '#32cd32' },
            downPunch: { name: '生根击', damage: 85, color: '#006400' },
            upPunch: { name: '藤蔓缠', damage: 90, color: '#228b22' },
